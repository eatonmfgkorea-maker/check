  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2 flex-wrap">
        <input type="date" className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-[13px] font-semibold" value={fd} onChange={e=>setFd(e.target.value)}/>
        {fd && <button onClick={()=>setFd("")} className="px-2 py-2 rounded-lg text-[12px] font-bold text-slate-400 border border-slate-200">전체 날짜</button>}
        <select className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-[13px] font-semibold" value={fl} onChange={e=>setFl(e.target.value)}>
          <option value="">전체 라인</option>
          {lines.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        <select className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-[13px] font-semibold" value={fs} onChange={e=>setFs(e.target.value)}>
          <option value="">주야 전체</option><option value="주간">주간</option><option value="야간">야간</option>
        </select>
        <button onClick={onReload} className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-[12px] font-bold text-slate-600">🔄</button>
        <button onClick={()=>setAddOpen(true)} className="px-3 py-2 rounded-lg bg-slate-900 text-white text-[12px] font-bold">📷 + 추가</button>
        <span className="ml-auto text-[11px] text-slate-400">{shown.length}장</span>
      </div>

      {photos.state==="loading" && list.length===0 && <div className="text-center text-slate-300 py-14 text-[14px]">불러오는 중…</div>}
      {photos.state!=="loading" && shown.length===0 && (
        <div className="text-center text-slate-400 py-14 text-[14px]">{fd?`${fmtDate(fd)} 현황판 사진이 없습니다.`:"현황판 사진이 없습니다."}<br/><span className="text-[12px]">생산계획 탭에서 라인별로 📷+ 를 눌러 올릴 수 있고, {fd?"위에서 [전체 날짜]를 누르면 지난 사진도 보여요.":"날짜·라인으로 필터할 수 있어요."}</span></div>
      )}

      {byDate.map(([d, arr])=>(
        <div key={d}>
          <div className="text-[13px] font-extrabold text-slate-600 mb-1.5">{fmtDate(d)} <span className="text-slate-300 font-semibold">· {arr.length}장</span></div>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5">
            {arr.map(p=>(
              <div key={p.id} className="rounded-2xl border border-slate-200 bg-white overflow-hidden">
                <ThumbImg id={p.thumbId} getThumb={getThumb} className="w-full h-32 object-cover cursor-pointer" onClick={()=>setViewer(p)}/>
                <div className="px-2.5 py-2">
                  <div className="font-bold text-slate-700 text-[12.5px] leading-tight">{p.line||"-"}</div>
                  <div className="text-[11px] text-slate-400">{p.shift}{p.by?` · ${p.by}`:""}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}

      <input ref={addFileRef} type="file" accept="image/*" onChange={onAddFile}
        style={{position:"absolute", width:1, height:1, opacity:0, overflow:"hidden", pointerEvents:"none"}}/>
      {addOpen && (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-5" onClick={()=>!aBusy&&setAddOpen(false)}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={e=>e.stopPropagation()}>
            <div className="text-[16px] font-extrabold text-slate-800">📷 현황판 사진 추가</div>
            <p className="text-[12px] text-slate-400 mt-0.5 mb-4">생산계획에 없는 라인도 올릴 수 있습니다.</p>
            <div className="space-y-3">
              <Field label="날짜"><input type="date" className={inputCls} value={aDate} onChange={e=>setADate(e.target.value)}/></Field>
              <Field label="라인">
                <select className={inputCls} value={aLine} onChange={e=>setALine(e.target.value)}>
                  <option value="">선택</option>
                  {[...new Set([...(masterLines||[]), ...lines])].map(l=><option key={l} value={l}>{l}</option>)}
                  <option value="__custom__">(직접 입력)</option>
                </select>
              </Field>
              {aLine==="__custom__" && (
                <Field label="라인명 직접 입력"><input className={inputCls} placeholder="예: Pilot 라인" value={aLineCustom} onChange={e=>setALineCustom(e.target.value)}/></Field>
              )}
              <Field label="주 / 야">
                <select className={inputCls} value={aShift} onChange={e=>setAShift(e.target.value)}>
                  <option value="주간">주간</option><option value="야간">야간</option>
                </select>
              </Field>
            </div>
            <div className="mt-5 flex gap-2">
              <button disabled={aBusy} onClick={()=>setAddOpen(false)} className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-500 font-bold disabled:opacity-50">취소</button>
              <button disabled={aBusy} onClick={pickAddPhoto} className="flex-[2] py-2.5 rounded-xl bg-slate-900 text-white font-bold disabled:opacity-50">{aBusy?"올리는 중…":"📷 사진 선택 / 촬영"}</button>
            </div>
          </div>
        </div>
      )}

      {viewer && <PhotoViewer p={viewer} getThumb={getThumb} onDownload={onDownload}
        onDelete={async()=>{ await onDelete(viewer); setViewer(null); }} onClose={()=>setViewer(null)}/>}
    </div>
  );
}

function PlanView({records, settings, planData, onUploadPlan, reportSync, onReloadReport, onHardRefresh, lineFocus, onClearFocus, adminUnlocked, jumpDate, photos, onUploadPhoto, getThumb, onDownloadPhoto, onDeletePhoto, onCreate, onOpen, onEdit}){
  const [date, setDate] = useState(todayStr());
  useEffect(()=>{ if(jumpDate) setDate(jumpDate); }, [jumpDate]);   // 달력에서 넘어온 날짜 적용
  const fileRef = useRef(null);
  const hasPlan = !!(planData && Array.isArray(planData.rows) && planData.rows.length);
  const canWrite = !!lineFocus || !!adminUnlocked;   // QR 라인 모드 또는 관리자 로그인 → 작성 가능

  // 작성자 선택 + 비번 관문 (QR 작성 시)
  const [writerGate, setWriterGate] = useState(null);   // {type, payload} | null
  const [gatePick, setGatePick] = useState("");
  const [gatePw, setGatePw] = useState("");
  const [authedWriters, setAuthedWriters] = useState(()=> new Set());
  const reqCreate = (type, payload)=>{ setGatePick(""); setGatePw(""); setWriterGate({type, payload}); };
  const doCreate = (name)=>{ const g=writerGate; setWriterGate(null); setGatePick(""); setGatePw(""); if(g) onCreate(g.type, {...g.payload, writer:name}); };
  const pickWriter = (name)=>{ const pw=(settings.passwords||{})[name]; if(adminUnlocked || authedWriters.has(name)){ doCreate(name); return; } if(!pw){ alert("이 작성자는 비밀번호가 설정되어 있지 않아 작성할 수 없습니다.\n설정에서 작성자 비밀번호를 등록해야 작성이 가능합니다. (비밀번호 없이는 조회만 가능)"); return; } setGatePick(name); setGatePw(""); };
  const tryPw = (name)=>{ const pw=(settings.passwords||{})[name]; if(hashPw(gatePw)===pw){ setAuthedWriters(prev=>{ const n=new Set(prev); n.add(name); return n; }); doCreate(name); } else { alert("비밀번호가 일치하지 않습니다."); } };

  // QR 라인 모드: 라인명 또는 라인코드(AGV 등)를 실제 계획의 라인명으로 해석
  const focusName = useMemo(()=>{
    if(!lineFocus) return "";
    const p = normLine(lineFocus);
    const lines = [...new Set((planData.rows||[]).map(r=>r.line).filter(Boolean))];
    let f = lines.find(l=>normLine(l)===p);
    if(!f) f = lines.find(l=> String((planData.lineCodes||{})[normLine(l)]||"").toUpperCase()===String(lineFocus).trim().toUpperCase());
    return f || lineFocus;
  }, [lineFocus, planData]);

  // 매칭: 품번(정규화) + 날짜(행별 rdate) + 주야
  const recOf = (type, row)=> records.find(r=> r.type===type && samePno(r.part, row.pno) &&
    fmtDate(type==="dock" ? (r.checkDate||r.prodDate||r.createdAt) : (r.prodDate||r.createdAt)) === (row.rdate||date) &&
    (!r.shift || r.shift===row.shift) &&
    (!r.line || !row.line || normLine(r.line)===normLine(row.line)));   // 라인까지 일치해야 (New ICV/Old ICV 분리)

  // 순서: Start Up → Dock Audit → 초도양산(선택). 미작성 카운트는 필수 항목만.
  const CL_TYPES = [["startup","Start Up",true],["dock","Dock Audit",true],["first","초도양산",false]];

  // 선택 날짜 행 (엑셀 그대로) — 주/야·품번 단위로 합산
  const allRows = useMemo(()=>{
    if(!hasPlan) return [];
    const m=new Map();
    planData.rows.forEach(row=>{
      if(row.date!==date) return;
      const k=row.shift+"|"+(row.line||"")+"|"+row.pno;   // 라인+품번 단위 (New ICV/Old ICV 분리 유지)
      if(!m.has(k)) m.set(k,{shift:row.shift, pno:row.pno, name:row.name||"", line:row.line||"", qty:0, rdate:date});
      const e=m.get(k); e.qty+=(row.qty||0);
      if(!e.name && row.name) e.name=row.name;
      if(!e.line && row.line) e.line=row.line;
    });
    let arr=[...m.values()];
    if(lineFocus) arr = arr.filter(r=> normLine(r.line)===normLine(focusName));
    return arr;
  }, [planData, date, hasPlan, lineFocus, focusName]);

  // 이월 야간: QR(라인) 모드에서 오늘 이전 '가장 최근 날짜'의 야간 미작성분 (금욜 야간→월욜 아침 대응)
  const carryRows = useMemo(()=>{
    if(!lineFocus || !hasPlan) return [];
    const fn = normLine(focusName);
    const nights = planData.rows.filter(r=> r.shift==="야간" && normLine(r.line)===fn && String(r.date) < date);
    if(!nights.length) return [];
    const latest = nights.reduce((mx,r)=> (String(r.date)>mx? String(r.date): mx), "");
    const m=new Map();
    planData.rows.forEach(row=>{
      if(String(row.date)!==latest || row.shift!=="야간" || normLine(row.line)!==fn) return;
      const k=(row.line||"")+"|"+row.pno;
      if(!m.has(k)) m.set(k,{shift:"야간", pno:row.pno, name:row.name||"", line:row.line||"", qty:0, rdate:latest});
      const e=m.get(k); e.qty+=(row.qty||0);
      if(!e.name && row.name) e.name=row.name;
    });
    let arr=[...m.values()];
    arr = arr.filter(row=> CL_TYPES.some(([t,,req])=> req && !recOf(t,row)));  // 이미 다 작성됐으면 숨김
    return arr;
  }, [planData, date, hasPlan, lineFocus, focusName, records]);

  const bySect = useMemo(()=>{
    const sect = {"주간":[], "야간":[]};
    allRows.forEach(r=>{ (sect[r.shift]||(sect[r.shift]=[])).push(r); });
    Object.values(sect).forEach(a=>a.sort((x,y)=> (x.line||"").localeCompare(y.line||"","ko") || (x.name||"").localeCompare(y.name||"","ko") || x.pno.localeCompare(y.pno)));
    return sect;
  }, [allRows]);
  const total = allRows.length;

  const missing = useMemo(()=> [...allRows, ...carryRows].reduce((s,row)=> s + CL_TYPES.filter(([t,,req])=>req && !recOf(t,row)).length, 0), [allRows, carryRows, records, date]);

  // QR 라인 모드 자동 동작: 현재 시간대(06~18시 주간, 그외 야간) 기준
  const curShift = (new Date().getHours()>=6 && new Date().getHours()<18) ? "주간" : "야간";
  const autoRef = useRef(false);
  const [noPlanAsk, setNoPlanAsk] = useState(false);
  const [lineAsk, setLineAsk] = useState(false);
  const createManual = (type)=>{
    setNoPlanAsk(false);
    reqCreate(type, {line: focusName||lineFocus, name:"", pno:"", date, shift: curShift});
  };
  useEffect(()=>{
    if(!lineFocus || autoRef.current) return;
    const ready = hasPlan || (reportSync && (reportSync.state==="ok" || reportSync.state==="err"));
    if(!ready) return;
    autoRef.current = true;
    if(allRows.length===0 && carryRows.length===0){
      // 오늘도 이전 야간도 없음 → Start Up / Dock Audit 선택 팝업
      setNoPlanAsk(true);
      return;
    }
    // 계획(또는 이전 야간 미작성) 있음 → 선택 패널
    setLineAsk(true);
  }, [lineFocus, hasPlan, reportSync, allRows, carryRows]);

  // 선택 패널에 보여줄 품목: 이전 야간 미작성 + 현재 시간대 우선(없으면 오늘 전체)
  const askRows = useMemo(()=>{
    const s = allRows.filter(r=>r.shift===curShift);
    const today = s.length ? s : allRows;
    return [...carryRows, ...today];
  }, [allRows, carryRows, curShift]);

  const StatusBtn = ({type, row, optional})=>{
    const rec = recOf(type, row);
    if(!rec){
      if(!canWrite) return (
        <div title="라인 QR을 스캔하거나 설정에서 관리자 로그인하면 작성할 수 있습니다"
          className="w-full px-1 py-1.5 rounded-lg border-2 border-dashed border-slate-200 text-slate-300 text-[11px] font-bold whitespace-nowrap text-center">🔒</div>
      );
      return (
      <button onClick={()=>reqCreate(type,{line:row.line, name:row.name, pno:row.pno, date: row.rdate||date, shift:row.shift})}
        className={`w-full px-1 py-1.5 rounded-lg border-2 border-dashed text-[11px] font-bold whitespace-nowrap ${optional
          ? "border-slate-200 text-slate-300 hover:border-slate-400 hover:text-slate-500"
          : "border-slate-300 text-slate-400 hover:border-slate-500 hover:text-slate-600"}`}>
        {optional?"선택":"+ 작성"}
      </button>
      );
    }
    if(rec.status==="draft") return (
      canWrite
        ? <button onClick={()=>onEdit(rec)} className="w-full px-1 py-1.5 rounded-lg bg-amber-50 text-amber-700 text-[11px] font-bold border border-amber-200 whitespace-nowrap">임시저장</button>
        : <button onClick={()=>onOpen(rec)} className="w-full px-1 py-1.5 rounded-lg bg-amber-50 text-amber-600 text-[11px] font-bold border border-amber-200 whitespace-nowrap">임시저장</button>
    );
    if(rec.status==="pending") return (
      <button onClick={()=>onOpen(rec)} className="w-full px-1 py-1.5 rounded-lg bg-sky-50 text-sky-700 text-[11px] font-bold border border-sky-200 whitespace-nowrap">결재중</button>
    );
    return (
      <button onClick={()=>onOpen(rec)} className="w-full px-1 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 text-[11px] font-bold border border-emerald-200 whitespace-nowrap">✓ 완료</button>
    );
  };

  // 현황판 사진: 라인+날짜+주야당 1장
  const photoOf = (row)=> (photos&&photos.list||[]).find(p=> p.date===(row.rdate||date) && p.shift===row.shift && normLine(p.line)===normLine(row.line));
  const boardInputRef = useRef(null);
  const boardMetaRef = useRef(null);
  const [boardBusy, setBoardBusy] = useState("");      // "라인|주야" 업로드중 표시
  const [boardViewer, setBoardViewer] = useState(null); // 사진 미리보기 대상
  const pickBoardPhoto = (row)=>{ boardMetaRef.current={line:row.line, date: row.rdate||date, shift:row.shift}; boardInputRef.current && boardInputRef.current.click(); };
  const onBoardFile = async(e)=>{
    const f = e.target.files && e.target.files[0]; e.target.value="";
    const meta = boardMetaRef.current; if(!f || !meta) return;
    const key = normLine(meta.line)+"|"+meta.shift;
    setBoardBusy(key);
    await onUploadPhoto(f, meta);
    setBoardBusy("");
  };
  const BoardBtn = ({row})=>{
    const key = normLine(row.line)+"|"+row.shift;
    if(boardBusy===key) return <div className="w-full px-1 py-1.5 rounded-lg bg-slate-100 text-slate-400 text-[10.5px] font-bold text-center whitespace-nowrap">업로드…</div>;
    const ph = photoOf(row);
    if(ph) return <button onClick={()=>setBoardViewer(ph)}
      className="w-full px-1 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 text-[11px] font-bold border border-emerald-200 whitespace-nowrap">📷✓</button>;
    return <button onClick={()=>pickBoardPhoto(row)}
      className="w-full px-1 py-1.5 rounded-lg border-2 border-dashed border-slate-300 text-slate-400 text-[11px] font-bold whitespace-nowrap hover:border-slate-500 hover:text-slate-600">📷+</button>;
  };

  const SectTable = ({title, rows, accent})=>(
    <div className="rounded-2xl border border-slate-200 bg-white overflow-hidden">
      <div className="px-3 py-2 font-extrabold text-[14px] text-white flex items-center gap-2" style={{background:accent}}>
        {title} <span className="text-[12px] font-semibold opacity-80">{rows.length}품목</span>
      </div>
      {rows.length===0 ? <div className="text-center text-slate-300 py-6 text-[13px]">계획 없음</div> : (
        <div className="overflow-x-auto">
          <table className="w-full text-[13px]" style={{minWidth:"560px"}}>
            <thead>
              <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-[11.5px]">
                <th className="text-left px-1.5 py-1.5 font-bold w-[92px]">라인</th>
                <th className="text-left px-1.5 py-1.5 font-bold">품명 / 품번</th>
                <th className="text-right px-1 py-1.5 font-bold w-[46px]">수량</th>
                <th className="text-center px-1 py-1.5 font-bold w-[76px]">Start Up</th>
                <th className="text-center px-1 py-1.5 font-bold w-[76px]">Dock Audit</th>
                <th className="text-center px-1 py-1.5 font-bold w-[76px]">초도<span className="font-normal text-slate-400">(선택)</span></th>
                <th className="text-center px-1 py-1.5 font-bold w-[58px]">현황판</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(row=>(
                <tr key={row.shift+row.pno} className="border-b border-slate-100">
                  <td className="px-1.5 py-1.5 text-slate-600 text-[11px] leading-tight">{row.line||"-"}</td>
                  <td className="px-1.5 py-1.5">
                    <div className="font-semibold text-slate-800 leading-tight text-[12.5px]">{row.name||"-"}</div>
                    <div className="text-[10.5px] text-slate-400 leading-tight">{row.pno}</div>
                  </td>
                  <td className="px-1 py-1.5 text-right text-slate-600 text-[11.5px]">{row.qty?row.qty.toLocaleString():"-"}</td>
                  {CL_TYPES.map(([t,,req])=> <td key={t} className="px-1 py-1.5"><StatusBtn type={t} row={row} optional={!req}/></td>)}
                  <td className="px-1 py-1.5"><BoardBtn row={row}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );

  const rs = reportSync||{state:"idle"};
  const srcLabel = !hasPlan ? "" : (planData.source==="report" ? "Production 보고 연동" : "직접 업로드");

  // 선택 날짜의 조회일지
  const brf = useMemo(()=> records.find(r=>r.type==="briefing" && fmtDate(r.date)===date), [records, date]);
  const BrfBtn = ()=>{
    if(!brf) return <button onClick={()=>reqCreate("briefing",{date})}
      className="px-3 py-1.5 rounded-lg border-2 border-dashed border-slate-300 text-slate-400 text-[12px] font-bold hover:border-slate-500 hover:text-slate-600">+ 작성</button>;
    if(brf.status==="draft") return <button onClick={()=>onEdit(brf)} className="px-3 py-1.5 rounded-lg bg-amber-50 text-amber-700 text-[12px] font-bold border border-amber-200">임시저장 →</button>;
    if(brf.status==="pending") return <button onClick={()=>onOpen(brf)} className="px-3 py-1.5 rounded-lg bg-sky-50 text-sky-700 text-[12px] font-bold border border-sky-200">결재중</button>;
    return <button onClick={()=>onOpen(brf)} className="px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 text-[12px] font-bold border border-emerald-200">✓ 완료</button>;
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2 flex-wrap">
        <input type="date" className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-[13px] font-semibold" value={date} onChange={e=>setDate(e.target.value)}/>
        <button onClick={()=>onReloadReport&&onReloadReport()} disabled={rs.state==="loading"}
          className="px-3 py-2 rounded-lg bg-slate-900 text-white text-[12px] font-bold disabled:opacity-50">
          {rs.state==="loading"?"가져오는 중…":"🔄 보고에서 가져오기"}
        </button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden"
          onChange={e=>{ const f=e.target.files&&e.target.files[0]; if(f&&onUploadPlan) onUploadPlan(f); e.target.value=""; }}/>
        <button onClick={()=>fileRef.current&&fileRef.current.click()}
          className="px-3 py-2 rounded-lg border border-slate-300 bg-white text-slate-600 text-[12px] font-bold">📂 직접 올리기</button>
        <button onClick={()=>{ if(confirm("로컬 캐시를 비우고 보고에서 새로 받습니다.\n(저장된 계획만 초기화되며 점검표/결재는 영향 없음)")) onHardRefresh&&onHardRefresh(); }}
          className="px-3 py-2 rounded-lg border border-amber-300 bg-amber-50 text-amber-700 text-[12px] font-bold">♻️ 캐시 비우고 새로받기</button>
        {total>0 && (
          missing>0
            ? <span className="text-[12px] font-bold text-rose-600 bg-rose-50 px-2.5 py-1.5 rounded-lg">미작성 {missing}건</span>
            : <span className="text-[12px] font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1.5 rounded-lg">✓ 전부 작성됨</span>
        )}
        <span className="ml-auto text-[11px] text-slate-400">
          {hasPlan?`${srcLabel} · ${planData.file} (${fmtDate(planData.uploadedAt)})`:""}
          {rs.state==="err" && <span className="text-rose-400"> · {rs.msg}</span>}
        </span>
      </div>

      <input ref={boardInputRef} type="file" accept="image/*" onChange={onBoardFile}
        style={{position:"absolute", width:1, height:1, opacity:0, overflow:"hidden", pointerEvents:"none"}}/>
      {boardViewer && <PhotoViewer p={boardViewer} getThumb={getThumb} onDownload={onDownloadPhoto}
        onDelete={async()=>{ await onDeletePhoto(boardViewer); setBoardViewer(null); }} onClose={()=>setBoardViewer(null)}/>}

      {writerGate && (
        <div className="fixed inset-0 z-[60] bg-black/40 flex items-center justify-center p-4" onClick={()=>{setWriterGate(null);setGatePick("");setGatePw("");}}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl max-h-[85vh] overflow-auto" onClick={e=>e.stopPropagation()}>
            <div className="font-extrabold text-slate-800 text-[16px]">작성자 선택</div>
            <div className="text-[12px] text-slate-400 mt-0.5 mb-3">작성하려면 비밀번호 인증이 필요합니다. 인증 없이는 조회만 가능합니다.</div>
            <div className="space-y-2">
              {(settings.writers||[]).length===0 && <div className="text-[13px] text-slate-400 py-6 text-center">설정에 등록된 작성자가 없습니다.</div>}
              {(settings.writers||[]).map(name=>{
                const hasPw = !!(settings.passwords||{})[name];
                const authed = authedWriters.has(name);
                return (
                  <div key={name}>
                    <button onClick={()=>pickWriter(name)}
                      className={`w-full px-3 py-2.5 rounded-xl border text-[14.5px] font-bold text-left flex items-center justify-between ${gatePick===name?"border-indigo-400 bg-indigo-50":!hasPw&&!authed?"border-slate-100 bg-slate-50 text-slate-300":"border-slate-200 hover:border-slate-400"}`}>
                      <span>{name}</span>
                      <span className="text-[11px] font-semibold">{authed?<span className="text-emerald-500">인증됨 ✓</span>:hasPw?<span className="text-slate-400">🔒 비번 입력</span>:<span className="text-slate-300">비번 미설정 · 작성불가</span>}</span>
                    </button>
                    {gatePick===name && !authed && hasPw && (
                      <div className="flex gap-2 mt-2">
                        <input type="password" autoFocus value={gatePw} onChange={e=>setGatePw(e.target.value)}
                          onKeyDown={e=>{ if(e.key==="Enter") tryPw(name); }}
                          placeholder="비밀번호" className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-[13.5px]"/>
                        <button onClick={()=>tryPw(name)} className="px-4 py-2 rounded-lg bg-indigo-600 text-white font-bold text-[13px] whitespace-nowrap">확인</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <button onClick={()=>{setWriterGate(null);setGatePick("");setGatePw("");}} className="mt-4 w-full py-2.5 rounded-xl border border-slate-300 text-slate-500 font-bold text-[13.5px]">취소</button>
          </div>
        </div>
      )}

      {lineAsk && (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={()=>setLineAsk(false)}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-md shadow-xl max-h-[85vh] overflow-auto" onClick={e=>e.stopPropagation()}>
            <div className="text-[16px] font-extrabold text-slate-800">📍 {focusName||lineFocus}</div>
            <div className="text-[12px] text-slate-400 mt-0.5">{fmtDate(date)} · 현재 {curShift} · 작성할 점검표를 선택하세요</div>
            {askRows.map(row=>(
              <div key={row.shift+row.pno+(row.rdate||"")} className={`mt-4 border rounded-xl p-3 ${row.rdate && row.rdate!==date ? "border-purple-300 bg-purple-50" : "border-slate-200"}`}>
                <div className="font-bold text-slate-800 text-[14.5px]">{row.name||"-"}
                  <span className="ml-1.5 text-[11px] text-slate-400 font-semibold">{row.pno}{row.shift!==curShift?` · ${row.shift}`:""}</span>
                  {row.rdate && row.rdate!==date && <span className="ml-1.5 text-[11px] text-purple-600 font-bold">⏮️ {fmtDate(row.rdate)} 야간</span>}
                </div>
                <div className="grid grid-cols-2 gap-2 mt-2.5">
                  {[["startup","Start Up"],["dock","Dock Audit"]].map(([t,label])=>{
                    const rec = recOf(t,row);
                    const st = !rec ? {txt:"미작성", cls:"text-slate-400"}
                      : rec.status==="draft" ? {txt:"임시저장", cls:"text-amber-600"}
                      : rec.status==="pending" ? {txt:"결재중", cls:"text-sky-600"}
                      : {txt:"✓ 작성 완료", cls:"text-emerald-600"};
                    const m = TYPE_META[t]||{};
                    return (
                      <button key={t}
                        onClick={()=>{ setLineAsk(false);
                          if(!rec) reqCreate(t, {line:row.line, name:row.name, pno:row.pno, date: row.rdate||date, shift:row.shift});
                          else if(rec.status==="draft") onEdit(rec);
                          else onOpen(rec); }}
                        className="rounded-xl border-2 py-3 px-2 text-center bg-white" style={{borderColor:m.accent||"#cbd5e1"}}>
                        <div className="font-extrabold text-[14px]" style={{color:m.accent||"#334155"}}>{label}</div>
                        <div className={`text-[11.5px] font-bold mt-1 ${st.cls}`}>{st.txt}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
            <button onClick={()=>setLineAsk(false)} className="mt-4 w-full py-2.5 rounded-xl border border-slate-300 text-slate-500 font-bold text-[13.5px]">목록으로 보기</button>
          </div>
        </div>
      )}

      {noPlanAsk && (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-5" onClick={()=>setNoPlanAsk(false)}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={e=>e.stopPropagation()}>
            <div className="text-[16px] font-extrabold text-slate-800">📍 {focusName||lineFocus}</div>
            <p className="mt-2 text-[13.5px] text-slate-600 leading-relaxed">
              {fmtDate(date)} 오늘 이 라인의 생산계획이 없습니다.<br/>그래도 입력하시겠습니까?
            </p>
            <p className="mt-1 text-[11.5px] text-slate-400">라인·날짜·주야({curShift})만 채워지고 품명·품번은 직접 선택합니다.</p>
            <div className="mt-5 space-y-2">
              <button onClick={()=>createManual("startup")}
                className="w-full py-2.5 rounded-xl text-white font-bold text-[14px]" style={{background:(TYPE_META.startup||{}).accent||"#0f172a"}}>Start Up 작성</button>
              <button onClick={()=>createManual("dock")}
                className="w-full py-2.5 rounded-xl text-white font-bold text-[14px]" style={{background:(TYPE_META.dock||{}).accent||"#334155"}}>Dock Audit 작성</button>
              <button onClick={()=>setNoPlanAsk(false)}
                className="w-full py-2.5 rounded-xl border border-slate-300 text-slate-500 font-bold text-[14px]">취소</button>
            </div>
          </div>
        </div>
      )}

      {lineFocus && (
        <div className="rounded-2xl border border-indigo-200 bg-indigo-50 px-4 py-2.5 flex items-center gap-2">
          <span className="text-[15px]">📍</span>
          <div>
            <div className="text-[13.5px] font-extrabold text-indigo-800">{focusName||lineFocus} 라인 모드 <span className="text-emerald-600">· ✍️ 작성 가능</span></div>
            <div className="text-[11px] text-indigo-400">{fmtDate(date)} · 이 라인 품목만 표시 (현재 {curShift})</div>
          </div>
          <button onClick={onClearFocus} className="ml-auto px-3 py-1.5 rounded-lg bg-white border border-indigo-200 text-indigo-600 text-[12px] font-bold">전체 보기</button>
        </div>
      )}

      {!lineFocus && adminUnlocked && (
        <div className="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-2.5 flex items-center gap-2">
          <span className="text-[15px]">🔓</span>
          <div>
            <div className="text-[13px] font-extrabold text-emerald-800">관리자 모드 · ✍️ 전체 작성 가능</div>
            <div className="text-[11px] text-emerald-600">QR 없이도 모든 라인 작성 가능 · 작성자 비밀번호 없이 진행됩니다</div>
          </div>
        </div>
      )}

      {!lineFocus && !adminUnlocked && (
        <div className="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-2.5 flex items-center gap-2">
          <span className="text-[15px]">🔒</span>
          <div>
            <div className="text-[13px] font-extrabold text-amber-800">조회 전용 모드</div>
            <div className="text-[11px] text-amber-600">작성(Start Up·Dock Audit·초도)은 해당 라인 QR을 스캔해야 가능합니다 · 조회/현황판 사진은 가능</div>
          </div>
        </div>
      )}

      {!lineFocus && <div className="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 flex items-center gap-3">
        <span className="text-[14px]">📋</span>
        <div>
          <div className="text-[13px] font-extrabold text-slate-700">조회일지</div>
          <div className="text-[11px] text-slate-400">{fmtDate(date)}{brf&&brf.writer?` · 작성 ${brf.writer}`:""}</div>
        </div>
        <div className="ml-auto"><BrfBtn/></div>
      </div>}

      {!hasPlan && (
        <div className="text-[13px] text-slate-500 bg-white border border-slate-200 rounded-2xl p-5 text-center leading-relaxed">
          아직 생산계획이 없습니다.<br/>
          <b>Production 보고에 FE 생산계획을 올리면</b> 이 탭이 자동으로 가져옵니다 (앱을 열 때마다 최신 확인).<br/>
          {rs.state==="err" && <span className="text-rose-500 text-[12px]">보고에서 가져오기 실패: {rs.msg}<br/></span>}
          급할 땐 <b>📂 직접 올리기</b>로 같은 엑셀을 올려도 됩니다.
        </div>
      )}

      {hasPlan && total===0 && carryRows.length===0 && (
        <div className="text-center text-slate-400 py-14 text-[14px]">{fmtDate(date)} 기준 {lineFocus?`[${focusName||lineFocus}] 라인의 `:""}생산계획이 없습니다.</div>
      )}

      {total>0 && (
        <>
          <SectTable title="🌞 주간" rows={bySect["주간"]||[]} accent="#0369a1"/>
          <SectTable title="🌙 야간" rows={bySect["야간"]||[]} accent="#334155"/>
        </>
      )}

      {carryRows.length>0 && (
        <div className="rounded-2xl border-2 border-purple-200 bg-purple-50 p-2">
          <div className="px-2 py-1.5 text-[12px] font-bold text-purple-700 flex items-center gap-1.5">
            ⏮️ 이전 야간 미작성 · {fmtDate(carryRows[0].rdate)} <span className="text-purple-400 font-semibold">(전날 야간 작성용)</span>
          </div>
          <SectTable title="🌙 이전 야간" rows={carryRows} accent="#7e22ce"/>
        </div>
      )}

      <p className="text-[11px] text-slate-400">※ Production 보고에 올린 FE 생산계획 원본을 그대로 가져와 표시하며, 작성 드롭다운(품목 목록)도 같은 데이터로 자동 생성됩니다 — 따로 관리할 게 없습니다.</p>
    </div>
  );
}

/* ============================================================
   작성 선택
   ============================================================ */
function NewView({settings, onPick}){
  return (

/* ============================================================
   에디터
   ============================================================ */
function Editor({rec, settings, records, planData, onCancel, onSaveDraft, onSubmit}){
  const [r, setR] = useState(()=>JSON.parse(JSON.stringify(rec)));
  const meta = TYPE_META[r.type];
  const set = (patch)=>setR(prev=>({...prev, ...patch}));
  const setApproval = (k,name)=>setR(prev=>({...prev, approval:{...prev.approval, [k]:{...prev.approval[k], name}}}));

  // 최근 조회일지 (현재 문서 제외, 날짜/작성시각 최신)
  const latestBriefing = useMemo(()=> (records||[])
    .filter(x=>x.type==="briefing" && x.id!==rec.id)
    .sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.createdAt||"").localeCompare(a.createdAt||""))[0]
  , [records, rec.id]);

  const loadRecent = ()=>{
    if(!latestBriefing){ alert("불러올 이전 조회일지가 없습니다."); return; }
    if(!confirm(`${fmtDate(latestBriefing.date)} 조회일지 내용을 불러올까요? (현재 입력 중인 내용은 덮어쓰여집니다)`)) return;
    setR(prev=> cloneBriefingContent(prev, latestBriefing));
  };

  function validate(submit){
    if(!submit && r.type!=="briefing"){
      if(!r.name || !r.part){ alert("품명/품번을 선택하세요."); return false; }
    }
    if(submit){
      if(r.type!=="briefing"){
        const need = [];
        if(!r.name) need.push("품명");
        if(!r.part) need.push("생산품번");
        if(!r.shift) need.push("주/야");
        if(!r.shiftLeader) need.push("Shift Leader");
        if(r.type==="dock"){ if(!r.checkDate) need.push("검사일"); }
        else { if(!r.prodDate) need.push("생산일자"); }
        if(need.length){ alert(`입력하지 않은 항목이 있습니다.\n\n${need.join(", ")}\n\n위 항목을 모두 채운 뒤 결재상신하세요.`); return false; }

        const t = recTpl(r);
        const missingNos = (t.items||[]).filter(it=> !((r.items[it.no]||{}).r)).map(it=>it.no);
        let msg = "";
        if(missingNos.length) msg += `미점검 항목: ${missingNos.join(", ")}번`;
        if(r.type==="dock" && !(r.productAudit && r.productAudit.r)) msg += (msg?"\n":"") + "Product Audit 미점검";
        if(msg){ alert(`점검하지 않은 항목이 있습니다.\n\n${msg}\n\n모든 항목에 OK / NG 를 선택한 뒤 결재상신하세요.`); return false; }
      }
      if(!r.approval.s3.name){ alert("승인자를 지정하세요."); return false; }
    }
    return true;
  }

  return (
    <div className="min-h-screen pb-28">
      <header className="sticky top-0 z-20 bg-white border-b border-slate-200">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <button className="text-[14px] text-slate-500" onClick={onCancel}>← 취소</button>
          <div className="font-extrabold" style={{color:meta.accent}}>{meta.label}</div>
          <div className="w-12"/>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 pt-5 space-y-5">
        {r.type==="briefing"
          ? <BriefingFields r={r} set={set} setR={setR} settings={settings} planData={planData} onLoadRecent={loadRecent} hasRecent={!!latestBriefing} recentDate={latestBriefing?latestBriefing.date:""}/>
          : <ChecklistFields r={r} set={set} setR={setR} settings={settings} planData={planData}/>}

        {/* 결재선 */}
        <section className="rounded-2xl border border-slate-200 bg-white p-4">
          <div className="font-bold text-slate-700 mb-3">결재선</div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <Field label={roleLabels(r.type)[0]+" (작성자)"}>
              <PeopleSelect list={settings.writers} value={r.approval.s1.name || (r.shiftLeader||r.writer||"")} onChange={v=>setApproval("s1",v)}/>
            </Field>
            <Field label="승인자" req>
              <PeopleSelect list={settings.managers} value={r.approval.s3.name} onChange={v=>setApproval("s3",v)}/>
            </Field>
          </div>
          <p className="text-[12px] text-slate-400 mt-2">결재상신 시 <b>{roleLabels(r.type)[0]}</b> 서명이 자동 처리되고, 결재함에서 <b>승인자</b>가 승인하면 완료됩니다.</p>
        </section>
      </main>

      {/* 하단 고정 버튼 */}
      <div className="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 p-3">
        <div className="max-w-3xl mx-auto flex gap-2">
          <button className="flex-1 py-3 rounded-xl border border-slate-300 text-slate-600 font-bold"
            onClick={()=>{ if(validate(false)) onSaveDraft(r); }}>임시저장</button>
          <button className="flex-[2] py-3 rounded-xl bg-slate-900 text-white font-bold"
            onClick={()=>{ if(validate(true)) onSubmit(r); }}>결재상신</button>
        </div>
      </div>
    </div>
  );
}

function PeopleSelect({list, value, onChange}){
  const opts = uniq([...(list||[]), value].filter(Boolean));
  return (
    <select className={inputCls} value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">선택</option>
      {opts.map(n=> <option key={n} value={n}>{n}</option>)}
    </select>
  );
}

/* ---- 점검표 입력 ---- */
function ChecklistFields({r, set, setR, settings, planData}){
  const tpl = recTpl(r);
  const autoLot = ()=>{
    if(!r.shift){ alert("주/야를 먼저 선택하세요. (LOT 계산에 필요)"); return; }
    const date = r.type==="dock" ? (r.checkDate||r.prodDate) : r.prodDate;
    const lot = calcLot(planData, {date, shift:r.shift, line:r.line, pno:r.part});
    if(!lot){ alert("LOT을 계산하지 못했습니다.\n생산계획(라인코드/REV 맵 포함)이 연동되어 있고, 라인·품번·날짜가 계획과 일치하는지 확인하세요."); return; }
    if(r.type==="dock") set({batchNo:lot}); else set({lot});
  };
  const setItem = (no, patch)=> setR(prev=>({...prev, items:{...prev.items, [no]:{...prev.items[no], ...patch}}}));
  const setPA = (patch)=> setR(prev=>({...prev, productAudit:{...prev.productAudit, ...patch}}));

  // 검사 수량 기준(참고) — Dock
  const recoSize = useMemo(()=>{
    if(r.type!=="dock") return "";
    const n = parseInt(String(r.batchSize).replace(/[^0-9]/g,""),10);
    if(!n) return "";
    if(n<50) return "1"; if(n<=3200) return "50 pcs"; if(n<=10000) return "80 pcs"; if(n<=35000) return "125 pcs"; return "125 pcs+";
  }, [r.batchSize, r.type]);

  return (
    <>
      <section className="rounded-2xl border border-slate-200 bg-white p-4 space-y-4">
        <div className="text-[12px] text-slate-400">Doc No: {tpl.doc}</div>
        {(!settings.items || settings.items.length===0) && (
          <div className="text-[12px] text-amber-700 bg-amber-50 rounded-lg p-2.5">
            품목 목록이 비어 있습니다. <b>생산계획 탭에서 계획 엑셀을 올리면</b> 라인·품명·품번이 자동으로 채워집니다.
          </div>
        )}
        <MasterPicker lines={settings.lines} items={settings.items} value={{line:r.line,name:r.name,part:r.part}}
          onChange={(v)=>set({line:v.line, name:v.name, part:v.part, model:v.model ?? r.model})}/>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <Field label="생산 기종"><input className={inputCls} value={r.model} onChange={e=>set({model:e.target.value})}/></Field>
          <Field label="Shift Leader"><PeopleSelect list={settings.writers} value={r.shiftLeader} onChange={v=>set({shiftLeader:v})}/></Field>
          <Field label="주 / 야">
            <select className={inputCls} value={r.shift||""} onChange={e=>set({shift:e.target.value})}>
              <option value="">선택</option><option value="주간">주간</option><option value="야간">야간</option>
            </select>
          </Field>
          {r.type==="dock" ? <>
            <Field label="Batch No.">
              <div className="relative">
                <input className={inputCls+" pr-16"} value={r.batchNo} onChange={e=>set({batchNo:e.target.value})}/>
                <button type="button" onClick={autoLot} title="생산계획 기준 LOT 자동계산"
                  className="absolute right-1.5 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-md bg-slate-100 text-[11.5px] font-bold text-slate-500 hover:bg-slate-200">자동</button>
              </div>
            </Field>
            <Field label="검사일"><input type="date" className={inputCls} value={r.checkDate} onChange={e=>set({checkDate:e.target.value})}/></Field>
            <Field label="생산수량(Batch)"><input className={inputCls} inputMode="numeric" value={r.batchSize} onChange={e=>set({batchSize:e.target.value})}/></Field>
            <Field label={`검사수량(Sampling)${recoSize?` · 권장 ${recoSize}`:""}`}><input className={inputCls} value={r.samplingSize} onChange={e=>set({samplingSize:e.target.value})}/></Field>
          </> : <>
            <Field label="Batch(Lot) No.">
              <div className="relative">
                <input className={inputCls+" pr-16"} value={r.lot} onChange={e=>set({lot:e.target.value})}/>
                <button type="button" onClick={autoLot} title="생산계획 기준 LOT 자동계산"
                  className="absolute right-1.5 top-1/2 -translate-y-1/2 px-2.5 py-1 rounded-md bg-slate-100 text-[11.5px] font-bold text-slate-500 hover:bg-slate-200">자동</button>
              </div>
            </Field>
            <Field label="생산 일자"><input type="date" className={inputCls} value={r.prodDate} onChange={e=>set({prodDate:e.target.value})}/></Field>
          </>}
        </div>
      </section>

      <section className="space-y-2.5">
        {tpl.items.map(it=>{
          const v = r.items[it.no]||{r:"",rm:"",q:""};
          return (
            <div key={it.no} className="rounded-2xl border border-slate-200 bg-white p-3.5">
              <div className="flex gap-2.5">
                <div className="w-7 h-7 shrink-0 rounded-lg bg-slate-100 text-slate-600 grid place-items-center font-bold text-[13px]">{it.no}</div>
                <div className="flex-1 min-w-0">
                  {it.ph && <div className="text-[11px] font-bold mb-0.5" style={{color:TYPE_META[r.type].accent}}>{it.ph}</div>}
                  <div className="text-[14px] text-slate-800 leading-snug">{it.t}</div>
                  {it.m && <div className="text-[11px] text-slate-400 mt-0.5">검사방법: {it.m}</div>}
                </div>
              </div>
              <div className="mt-2.5 flex items-stretch gap-2">
                <div className="w-44"><OkNg value={v.r} onChange={x=>setItem(it.no,{r:x})}/></div>
                {r.type==="dock" && <input className="w-20 h-11 px-2 rounded-lg border border-slate-300 text-[13px] text-center" inputMode="numeric" placeholder="불량수" value={v.q} onChange={e=>setItem(it.no,{q:e.target.value})}/>}
                <input className="flex-1 h-11 px-3 rounded-lg border border-slate-300 text-[13px]" placeholder={r.type==="dock"?"비고":"Remarks"} value={v.rm} onChange={e=>setItem(it.no,{rm:e.target.value})}/>
              </div>
            </div>
          );
        })}

        {r.type==="dock" && (
          <div className="rounded-2xl border border-slate-200 bg-white p-3.5">
            <div className="text-[12px] font-bold text-amber-600 mb-1">{tpl.paLabel}</div>
            <div className="text-[14px] text-slate-800 leading-snug">{tpl.pa.t}</div>
            <div className="text-[11px] text-slate-400 mt-0.5">검사방법: {tpl.pa.m}</div>
            <div className="mt-2.5 flex items-stretch gap-2">
              <div className="w-44"><OkNg value={r.productAudit.r} onChange={x=>setPA({r:x})}/></div>
              <input className="flex-1 h-11 px-3 rounded-lg border border-slate-300 text-[13px]" placeholder="비고" value={r.productAudit.rm} onChange={e=>setPA({rm:e.target.value})}/>
            </div>
          </div>
        )}
      </section>
    </>
  );
}

/* ---- 조회일지 입력 ---- */
function BriefingFields({r, set, setR, settings, planData, onLoadRecent, hasRecent, recentDate}){
  const setArr = (key, idx, val)=> setR(prev=>{ const a=[...prev[key]]; a[idx]=val; return {...prev,[key]:a}; });
  const addArr = (key, val)=> setR(prev=>({...prev,[key]:[...prev[key], val]}));
  const delArr = (key, idx)=> setR(prev=>({...prev,[key]:prev[key].filter((_,i)=>i!==idx)}));
  const setDeliv = (idx, patch)=> setR(prev=>{ const a=[...prev.deliveries]; a[idx]={...a[idx],...patch}; return {...prev,deliveries:a}; });

  return (
    <>
      <button type="button" onClick={onLoadRecent} disabled={!hasRecent}
        className="w-full py-2.5 rounded-xl border-2 border-dashed border-emerald-300 text-emerald-700 font-bold text-[14px] bg-emerald-50/50 disabled:opacity-40 disabled:border-slate-200 disabled:text-slate-400">
        📋 최근 조회일지 불러오기{hasRecent && recentDate?` (${fmtDate(recentDate)})`:""}
      </button>

      <section className="rounded-2xl border border-slate-200 bg-white p-4">
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <Field label="일자"><input type="date" className={inputCls} value={r.date} onChange={e=>set({date:e.target.value})}/></Field>
          <Field label="시간"><div className={inputCls+" flex items-center text-slate-500 bg-slate-50"}>{BRIEFING_TIME}</div></Field>
          <Field label="장소">
            <select className={inputCls} value={r.place} onChange={e=>set({place:e.target.value})}>
              {uniq([...(settings.places||[]), r.place].filter(Boolean)).map(p=> <option key={p} value={p}>{p}</option>)}
            </select>
          </Field>
          <Field label="작성자"><PeopleSelect list={settings.writers} value={r.writer} onChange={v=>set({writer:v})}/></Field>
        </div>
        <div className="mt-3"><Field label="미참석자 명단"><input className={inputCls} placeholder="예: 서연옥(오전반차)" value={r.absentees} onChange={e=>set({absentees:e.target.value})}/></Field></div>
      </section>

      {/* 조회내용 */}
      <section className="rounded-2xl border border-slate-200 bg-white p-4 space-y-3">
        <div className="font-bold text-emerald-700">◈ 조회내용</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Field label={<span className="flex items-center gap-2">생산계획 — 주간
            <button type="button" onClick={()=>{ const t=briefingPlanText(planData, r.date, "주간"); if(t) set({planDay:t}); else alert("해당 날짜의 주간 생산계획이 없습니다."); }}
              className="text-[11px] font-bold text-indigo-500 border border-indigo-200 rounded px-1.5 py-0.5">🔄 계획 채우기</button></span>}>
            <input className={inputCls} placeholder="주 → D2UX, LX3 …" value={r.planDay} onChange={e=>set({planDay:e.target.value})}/></Field>
          <Field label={<span className="flex items-center gap-2">생산계획 — 야간
            <button type="button" onClick={()=>{ const t=briefingPlanText(planData, r.date, "야간"); if(t) set({planNight:t}); else alert("해당 날짜의 야간 생산계획이 없습니다."); }}
              className="text-[11px] font-bold text-indigo-500 border border-indigo-200 rounded px-1.5 py-0.5">🔄 계획 채우기</button></span>}>
            <input className={inputCls} placeholder="야 → 31XX" value={r.planNight} onChange={e=>set({planNight:e.target.value})}/></Field>
        </div>
        <div>
          <div className="text-[12px] font-semibold text-slate-500 mb-1">공통 안내사항</div>
          {r.notices.map((n,i)=>(
            <div key={i} className="flex gap-2 mb-1.5">
              <input className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-[13px]" value={n} onChange={e=>setArr("notices",i,e.target.value)}/>

            </div>
          ))}
          <button className="text-[12px] font-bold text-emerald-700" onClick={()=>addArr("notices","")}>+ 안내 추가</button>
        </div>
      </section>

      {/* 전달사항 */}
      <section className="rounded-2xl border border-slate-200 bg-white p-4 space-y-3">
        <div className="font-bold text-emerald-700">◈ 전달사항</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Field label="부품 문제 — 주간"><textarea rows={2} className={inputCls} value={r.partIssueDay} onChange={e=>set({partIssueDay:e.target.value})}/></Field>
          <Field label="부품 문제 — 야간"><textarea rows={2} className={inputCls} value={r.partIssueNight} onChange={e=>set({partIssueNight:e.target.value})}/></Field>
        </div>
        <div>
          <div className="text-[12px] font-semibold text-slate-500 mb-1">라인/공정별 전달</div>
          {r.deliveries.map((d,i)=>(
            <div key={i} className="flex gap-2 mb-2 items-start">
              <select className="w-28 px-2 py-2 rounded-lg border border-slate-300 text-[13px]" value={d.cat} onChange={e=>setDeliv(i,{cat:e.target.value})}>
                <option value="">구분</option>
                {uniq([...(settings.deliveryCats||[]), d.cat].filter(Boolean)).map(c=> <option key={c} value={c}>{c}</option>)}
              </select>
              <textarea rows={2} className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-[13px]" value={d.content} onChange={e=>setDeliv(i,{content:e.target.value})}/>
              <button className="px-2 py-2 text-slate-400" onClick={()=>delArr("deliveries",i)}>✕</button>
            </div>
          ))}
          <button className="text-[12px] font-bold text-emerald-700" onClick={()=>addArr("deliveries",{cat:"",content:""})}>+ 전달 추가</button>
        </div>
        <div>
          <div className="text-[12px] font-semibold text-slate-500 mb-1">기타전달</div>
          {r.etc.map((n,i)=>(
            <div key={i} className="flex gap-2 mb-1.5">
              <input className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-[13px]" value={n} onChange={e=>setArr("etc",i,e.target.value)}/>
              <button className="px-2 text-slate-400" onClick={()=>delArr("etc",i)}>✕</button>
            </div>
          ))}
          <button className="text-[12px] font-bold text-emerald-700" onClick={()=>addArr("etc","")}>+ 기타 추가</button>
        </div>
      </section>
    </>
  );
}

/* ============================================================
   결재함
   ============================================================ */
function recTitle(r){ return r.type==="briefing" ? `조회일지 · ${fmtDate(r.date)} · ${r.place}` : `${TPL[r.type].title} · ${r.name||"-"}`; }

// 품번 비교용 정규화: 대소문자/공백/하이픈/언더스코어 차이 무시 (20904F-CKD ≡ 20904f ckd)
function normPno(s){ return String(s||"").toUpperCase().replace(/[\s\-_./]/g,""); }
function samePno(a,b){ const x=normPno(a), y=normPno(b); return !!x && x===y; }
function normLine(s){ return String(s||"").toUpperCase().replace(/[\s\-_./]/g,""); }
// "New ICV / Old ICV" 합쳐진 계획 행을 New ICV / Old ICV로 분리.
// icvAssign(인원편성 기반 "품번|날짜|라인|주야" 키)이 있으면 실제 인원 배정된 조합만 생성.
function splitIcvRows(rows, icvAssign){
  if(!Array.isArray(rows)) return rows;
  const keys = (icvAssign instanceof Set) ? icvAssign : new Set(icvAssign||[]);
  const useAssign = keys.size>0;
  const has = (pno,date,line,shift)=> keys.has(`${normPno(pno)}|${date}|${line}|${shift}`);
  const out=[];
  rows.forEach(r=>{
    const ln = normLine(r.line);
    if(ln.includes("NEWICV") && ln.includes("OLDICV")){
      if(useAssign){
        const n = has(r.pno, r.date, "New ICV", r.shift);
        const o = has(r.pno, r.date, "Old ICV", r.shift);
        if(n) out.push({...r, line:"New ICV"});
        if(o) out.push({...r, line:"Old ICV"});
        if(!n && !o){ out.push({...r, line:"New ICV"}); out.push({...r, line:"Old ICV"}); }  // 정보없으면 안전상 둘다
      } else {
        out.push({...r, line:"New ICV"});
        out.push({...r, line:"Old ICV"});
      }
    } else out.push(r);
  });
  return out;
}

/* 계획 엑셀에서 LOT 자동계산용 맵 추출: 모품목(품번→REV) + 오라클바코드출력용(라인명→라인코드) */
function extractLotMaps(wb){
  const revMap={}, lineCodes={};
  try{
    const wsM = wb.Sheets["모품목"];
    if(wsM && wsM["!ref"]){
      const rg = XLSX.utils.decode_range(wsM["!ref"]);
      for(let r=2; r<=rg.e.r; r++){
        const i=wsM[XLSX.utils.encode_cell({r,c:8})], j=wsM[XLSX.utils.encode_cell({r,c:9})];   // I, J열
        if(i&&j&&i.v!=null&&j.v!=null&&String(i.v).trim()&&String(j.v).trim()){
          const pk=normPno(i.v), val=String(j.v).trim(), ph=/^0+$/.test(val);   // "00" 등 placeholder는 정상값을 덮지 않음
          if(!(pk in revMap) || (/^0+$/.test(revMap[pk]) && !ph)) revMap[pk]=val;
        }
      }
    }
    const wsB = wb.Sheets["오라클 바코드출력용"];
    if(wsB && wsB["!ref"]){
      for(let r=3; r<=20; r++){                                  // A4:B21
        const a=wsB[XLSX.utils.encode_cell({r,c:0})], b=wsB[XLSX.utils.encode_cell({r,c:1})];
        if(a&&b&&a.v!=null&&b.v!=null&&String(a.v).trim()&&String(b.v).trim()) lineCodes[normLine(a.v)]=String(b.v).trim();
      }
    }
  }catch(e){}
  return {revMap, lineCodes};
}

/* 점검표 직접업로드용: 인원편성 시트에서 ICV New/Old × 주야 인원>0 키 (점검표 날짜포맷 사용) */
function parseIcvAssignCl(wb){
  const ws = wb.Sheets["인원편성"];
  if(!ws || !ws["!ref"]) return [];
  const rg = XLSX.utils.decode_range(ws["!ref"]);
  const gc = (r,c)=>{ const x=ws[XLSX.utils.encode_cell({r,c})]; return x?x.v:undefined; };
  let hdrRow=4, best=-1;
  for(let r=0;r<=10;r++){ let cnt=0; for(let c=0;c<=rg.e.c;c++){ const v=gc(r,c); if(typeof v==="number"&&v>40000) cnt++; } if(cnt>best){best=cnt;hdrRow=r;} }
  const dateCols={};
  for(let c=0;c<=rg.e.c;c++){ const v=gc(hdrRow,c); const ds=excelSerialToDateStr(v); if(ds) dateCols[c]=ds; }
  const keys=new Set();
  for(let r=0;r<=rg.e.r;r++){
    const g=String(gc(r,6)||"").trim();
    if(g!=="New ICV" && g!=="Old ICV") continue;
    const m=String(gc(r,12)||"").trim();
    let shift=null; if(m==="주간인원") shift="주간"; else if(m==="야간인원") shift="야간"; else continue;
    const pno=normPno(gc(r,8)); if(!pno) continue;
    for(const c in dateCols){ const v=gc(r,parseInt(c)); if(typeof v==="number"&&v>0) keys.add(`${pno}|${dateCols[c]}|${g}|${shift}`); }
  }
  return Array.from(keys);
}

/* LOT(JOB Number) 자동계산 — 엑셀 '오라클 바코드출력용' 규칙 그대로:
   REV코드(모품목) + 라인코드 + YYMMDD + 주야(주간 A/야간 B) + 당일 같은 라인 품목 순번 */
function calcLot(planData, t){   // t: {date, shift, line, pno}
  if(!planData || !t || !t.date) return "";
  const lc = (planData.lineCodes||{})[normLine(t.line)] || "";
  if(!lc) return "";
  const rev = (planData.revMap||{})[normPno(t.pno)] || "";
  const ymd = String(t.date).slice(2,10).replace(/-/g,"");
  const sc = t.shift==="야간" ? "B" : "A";
  let seq=0; const seen=new Set();
  for(const r of (planData.rows||[])){
    if(r.date!==t.date || r.shift!==t.shift) continue;
    if(((planData.lineCodes||{})[normLine(r.line)]||"")!==lc) continue;
    const k=normPno(r.pno);
    if(seen.has(k)) continue;
    seen.add(k);
    if(samePno(r.pno, t.pno)){ seq=seen.size; break; }
  }
  if(!seq) seq=1;
  return rev+lc+ymd+sc+seq;
}

// 결재 요청 메일 (여러 건을 한 통으로). recs: 같은 결재자에게 갈 문서 배열
function buildApprovalListMail(recs, toName){
  const url = APP_URL + (APP_URL.indexOf("#")>=0 ? "" : "#inbox");
  const n = recs.length;
  const dOf = (r)=> r.type==="briefing" ? fmtDate(r.date) : fmtDate(r.prodDate||r.checkDate||r.createdAt);
  const meta0 = TYPE_META[recs[0].type];
  const line0 = recs[0].type==="briefing" ? (recs[0].place||"") : (recs[0].line||"");

  const subject = n===1
    ? `[결재요청] ${dOf(recs[0])} / ${meta0.label} / ${line0||"-"}`
    : `[결재요청] ${dOf(recs[0])} ${meta0.label} 외 ${n-1}건`;

  const tdK = "padding:7px 12px;background:#f1f5f9;color:#475569;font-size:12px;font-weight:700;border:1px solid #e2e8f0;white-space:nowrap;width:84px";
  const tdV = "padding:7px 12px;color:#111827;font-size:13px;border:1px solid #e2e8f0";

  const rowsOf = (r)=>{
    const m = TYPE_META[r.type];
    if(r.type==="briefing") return [["일자",fmtDate(r.date)],["시간",BRIEFING_TIME],["장소",r.place||"-"],["작성자",r.writer||"-"]];
    if(r.type==="dock") return [["점검표",m.label],["라인",r.line||"-"],["품명",r.name||"-"],["생산품번",r.part||"-"],["Batch No",r.batchNo||"-"],["검사일",r.checkDate?fmtDate(r.checkDate):"-"],["검사수량",r.samplingSize||"-"],["생산수량",r.batchSize||"-"],["Shift Leader",r.shiftLeader||"-"]];
    return [["점검표",m.label],["라인",r.line||"-"],["품명",r.name||"-"],["생산품번",r.part||"-"],["Lot",r.lot||"-"],["생산일자",r.prodDate?fmtDate(r.prodDate):"-"],["생산기종",r.model||"-"],["Shift Leader",r.shiftLeader||"-"]];
  };

  const docBlock = (r)=>{
    const m = TYPE_META[r.type];
    const body = rowsOf(r).map(([k,v])=>`<tr><td style="${tdK}">${k}</td><td style="${tdV}">${v}</td></tr>`).join("");
    const L = roleLabels(r.type); const a = r.approval||{};
    const chain = `${L[0]} ${a.s1&&a.s1.name||"-"} → ${L[2]} ${a.s3&&a.s3.name||"-"}`;
    return `<div style="margin:0 0 16px">
      <div style="display:inline-block;font-size:13px;font-weight:800;color:#fff;background:${m.accent};padding:4px 12px;border-radius:6px;margin:0 0 8px">${m.label}${r.name?` · ${r.name}`:""}</div>
      <table style="border-collapse:collapse;width:100%">${body}</table>
      <div style="margin-top:6px;font-size:11.5px;color:#64748b">결재선 &nbsp;${chain}</div>
    </div>`;
  };

  const lead = `${toName?`<b>${toName}</b>님, `:""}아래 문서의 결재를 요청드립니다. (${n}건)`;
  const html = `<div style="font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1f2937;max-width:560px;margin:0 auto;padding:4px">
    <div style="font-size:19px;font-weight:800;color:#0f172a;margin:0 0 4px">결재 요청</div>
    <div style="font-size:13px;color:#475569;margin:0 0 18px">${lead}</div>
    ${recs.map(docBlock).join("")}
    <a href="${url}" style="display:inline-block;margin-top:6px;background:#0f172a;color:#ffffff;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:800;font-size:14px">결재하러 가기 →</a>
    <div style="margin-top:20px;padding-top:10px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:11px">현장 점검표 · 조회일지 전자결재 시스템 · 발신 전용 메일</div>
  </div>`;

  const text = `${toName?toName+"님, ":""}결재 요청 ${n}건\n\n` + recs.map(r=>
    r.type==="briefing" ? `· [조회일지] ${fmtDate(r.date)} ${r.place||""} (작성 ${r.writer||"-"})`
    : `· ${dOf(r)} ${TYPE_META[r.type].label} ${r.line||""} ${r.name||""} Lot ${lotOf(r)||"-"}`
  ).join("\n") + `\n\n결재하러 가기: ${url}`;

  return { subject, html, text };
}

              className={`px-3 py-1 rounded-full text-[12px] font-semibold ${person===""?"bg-slate-900 text-white":"bg-slate-100 text-slate-600"}`}>전체 결재자</button>
            {groups.map(([name,list])=>(

            ))}
          </div>
          {!person && <p className="text-[12px] text-slate-400">결재자를 선택하면 그 사람의 대기 건을 한 번에 결재할 수 있습니다. (비밀번호는 결재자별로 다릅니다)</p>}
          {groups.filter(([name])=> !person || name===person).map(([name,list])=>(
            <div key={name} className="rounded-2xl border border-slate-200 bg-slate-50/60 p-3">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <div className="w-7 h-7 rounded-full bg-slate-800 text-white grid place-items-center text-[12px] font-bold">{(name&&name[0])||"?"}</div>
                <div className="font-bold text-slate-700 text-[14px]">{name}</div>

function AuthModal({auth, passwords, onSetPassword, onClose, onConfirm}){
  const has = !!(passwords && passwords[auth.name]);
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [comment, setComment] = useState("");
  const submit = ()=>{
    if(!auth.name || auth.name==="(미지정)"){ alert("결재자가 지정되지 않은 문서입니다."); return; }
    if(has){
      if(hashPw(pw)!==passwords[auth.name]){ alert("비밀번호가 일치하지 않습니다."); return; }
      onConfirm(comment);
    } else {
      if(pw.length<4){ alert("비밀번호는 4자 이상으로 설정하세요."); return; }
      if(pw!==pw2){ alert("비밀번호 확인이 일치하지 않습니다."); return; }
      onSetPassword(auth.name, hashPw(pw));

    <div className="fixed inset-0 z-50 bg-black/40 grid place-items-center p-4" onClick={onClose}>

          <div className="mt-4">
            <Field label="비밀번호">

          <button className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 font-bold" onClick={onClose}>취소</button>

  );

          {planData&&planData.file && <span className="text-slate-400">· {planData.file}</span>}
          {settings.masterLoadedAt && <span className="text-slate-300">· {fmtDateTime(settings.masterLoadedAt)}</span>}

      <div className="rounded-2xl border border-slate-200 bg-white p-4">
        <div className="flex items-center justify-between mb-2">

          <input className="w-48 px-3 py-1.5 rounded-lg border border-slate-300 text-[13px]" placeholder="라인/품명/품번 검색" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        {items.length===0 ? (
          <p className="text-[13px] text-slate-400 py-6 text-center">품목이 없습니다. 생산계획 탭에서 엑셀을 올려주세요.</p>

              <thead className="sticky top-0 bg-slate-50">
                <tr className="text-slate-500"><th className="text-left p-2 w-24">라인</th><th className="text-left p-2 w-1/3">품명</th><th className="text-left p-2">생산품번</th></tr>
              </thead>

                {filtered.map((it,i)=>(

                    <td className="p-2 font-semibold text-slate-700">{it.item}</td>
                    <td className="p-2 text-slate-500">
                      <div className="flex flex-wrap gap-1">
                        {(it.partNos||[]).length===0 ? <span className="text-slate-300">품번 없음</span>

function TemplateSettings({settings, setSettings}){
  const TYPES=[["startup","Start Up"],["dock","Dock Audit"],["first","초도양산점검표"]];
  const [t,setT]=useState("startup");
  const base = TPL[t];
  const cur = (settings.templates && settings.templates[t]) || null;
  const doc = cur && cur.doc!=null ? cur.doc : base.doc;
  const items = cur && Array.isArray(cur.items) && cur.items.length ? cur.items : base.items.map(it=>({...it}));
  const phases = ["양산 전","양산","출하"];

  const save=(nextDoc, nextItems)=>{
    const renum = nextItems.map((it,i)=>({...it, no:i+1}));
    setSettings(p=>({...p, templates:{...(p.templates||{}), [t]:{doc:nextDoc, items:renum}}}));
  };
  const setDoc=(v)=> save(v, items);
  const upd=(i,patch)=> save(doc, items.map((it,j)=>j===i?{...it,...patch}:it));
  const del=(i)=>{ if(!confirm(`${i+1}번 항목을 삭제할까요?`)) return; save(doc, items.filter((_,j)=>j!==i)); };
  const add=()=> save(doc, [...items, {no:items.length+1, ...(t==="first"?{ph:"양산"}:{}) , t:"", m:""}]);
  const move=(i,dir)=>{ const j=i+dir; if(j<0||j>=items.length) return; const a=[...items]; [a[i],a[j]]=[a[j],a[i]]; save(doc,a); };
  const reset=()=>{ if(!confirm("이 점검표 양식을 기본값으로 되돌릴까요?")) return;
    setSettings(p=>{ const m={...(p.templates||{})}; delete m[t]; return {...p, templates:m}; }); };
  const isCustom = !!cur;

  return (
    <div className="space-y-3">
      <div className="rounded-2xl border border-slate-200 bg-white p-4">
        <div className="flex items-center gap-2 flex-wrap">
          <div className="inline-flex rounded-xl border border-slate-200 bg-slate-50 p-0.5">
            {TYPES.map(([k,label])=>(
              <button key={k} onClick={()=>setT(k)}
                className={`px-3 py-1.5 rounded-lg text-[13px] font-bold ${t===k?"bg-slate-900 text-white":"text-slate-500"}`}>{label}</button>
            ))}
          </div>
          <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${isCustom?"text-sky-700 bg-sky-50":"text-slate-400 bg-slate-100"}`}>{isCustom?"수정됨":"기본 양식"}</span>
          {isCustom && <button onClick={reset} className="ml-auto text-[12px] px-3 py-1.5 rounded-lg border border-slate-300 text-slate-500 font-semibold">기본 양식으로 되돌리기</button>}
        </div>
        <p className="text-[12px] text-slate-400 mt-2.5 leading-relaxed">
          여기서 수정한 양식은 <b>앞으로 새로 작성하는 문서부터</b> 적용됩니다. 이미 작성/결재된 문서는 작성 당시 양식 그대로 보존돼요.
        </p>
        <div className="mt-3 max-w-xs">
          <Field label="Doc No."><input className={inputCls} value={doc} onChange={e=>setDoc(e.target.value)}/></Field>
        </div>
      </div>

      <div className="rounded-2xl border border-slate-200 bg-white p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="font-bold text-slate-700 text-[14px]">점검 항목 ({items.length})</div>
          <button onClick={add} className="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-[12px] font-bold">+ 항목 추가</button>
        </div>
        <div className="space-y-2">
          {items.map((it,i)=>(
            <div key={i} className="flex gap-2 items-start border border-slate-100 rounded-xl p-2.5">
              <div className="w-7 h-7 rounded-lg bg-slate-100 grid place-items-center text-[12px] font-bold text-slate-500 shrink-0 mt-0.5">{i+1}</div>
              <div className="flex-1 space-y-1.5">
                <div className="flex gap-1.5">
                  {t==="first" && (
                    <select className="px-2 py-1.5 rounded-lg border border-slate-300 text-[12px] w-24 shrink-0" value={it.ph||"양산"} onChange={e=>upd(i,{ph:e.target.value})}>
                      {phases.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                  )}
                  <input className="flex-1 px-2 py-1.5 rounded-lg border border-slate-300 text-[12px]" placeholder="검사방법 (예: E-Mail, 라벨…)"
                    value={it.m||""} onChange={e=>upd(i,{m:e.target.value})}/>
                </div>
                <textarea className="w-full px-2 py-1.5 rounded-lg border border-slate-300 text-[13px]" rows={2} placeholder="점검 내용"
                  value={it.t||""} onChange={e=>upd(i,{t:e.target.value})}/>
              </div>
              <div className="flex flex-col gap-1 shrink-0">
                <button className="w-6 h-6 grid place-items-center rounded text-slate-300 hover:text-slate-600 hover:bg-slate-100 text-[11px]" onClick={()=>move(i,-1)}>▲</button>
                <button className="w-6 h-6 grid place-items-center rounded text-slate-300 hover:text-slate-600 hover:bg-slate-100 text-[11px]" onClick={()=>move(i,1)}>▼</button>
                <button className="w-6 h-6 grid place-items-center rounded text-slate-300 hover:text-rose-500 hover:bg-rose-50 text-[11px]" onClick={()=>del(i)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ListEditor({title, hint, items, onChange}){
  const [nw,setNw]=useState("");
  const list = items||[];
  const add=()=>{ const v=nw.trim(); if(!v) return; if(list.includes(v)){ setNw(""); return; } onChange([...list, v]); setNw(""); };
  const del=(i)=> onChange(list.filter((_,x)=>x!==i));
  const update=(i,v)=> onChange(list.map((x,j)=>j===i?v:x));
  return (
    <div className="rounded-2xl border border-slate-200 bg-white p-4">
      <div className="font-bold text-slate-700">{title}</div>
      {hint && <p className="text-[12px] text-slate-400 mt-0.5">{hint}</p>}
      <div className="mt-2 flex gap-2">
        <input className="flex-1 px-3 py-2 rounded-lg border border-slate-300 text-[13px]" placeholder="추가할 항목 입력"
          value={nw} onChange={e=>setNw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") add(); }}/>
        <button className="px-4 py-2 rounded-lg bg-slate-900 text-white text-[13px] font-bold" onClick={add}>추가</button>
      </div>
      <div className="mt-2 space-y-1">
        {list.length===0 && <p className="text-[12px] text-slate-300 py-1">등록된 항목이 없습니다.</p>}
        {list.map((v,i)=>(
          <div key={i} className="flex items-center gap-2">
            <input className="flex-1 px-2 py-1.5 rounded-lg border border-transparent hover:border-slate-200 focus:border-slate-300 text-[13px]"
              value={v} onChange={e=>update(i,e.target.value)}/>
            <button className="text-slate-300 hover:text-rose-500 px-1" onClick={()=>del(i)}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminPwSettings({settings, setSettings}){
  const [cur,setCur]=useState(""); const [nw,setNw]=useState(""); const [nw2,setNw2]=useState("");
  const change=()=>{
    if(settings.adminPw && hashPw(cur)!==settings.adminPw){ alert("현재 관리자 비밀번호가 일치하지 않습니다."); return; }
    if(nw.length<4){ alert("새 비밀번호는 4자 이상으로 설정하세요."); return; }
    if(nw!==nw2){ alert("새 비밀번호 확인이 일치하지 않습니다."); return; }
    setSettings(p=>({...p, adminPw:hashPw(nw)}));
    setCur(""); setNw(""); setNw2(""); alert("관리자 비밀번호가 변경되었습니다.");
  };
  return (
    <div className="rounded-2xl border border-slate-200 bg-white p-4">
      <div className="font-bold text-slate-700">관리자 비밀번호 (설정 진입)</div>
      <p className="text-[12px] text-slate-400 mt-0.5 mb-3">설정 화면에 들어올 때 입력하는 비밀번호입니다.</p>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
        <input type="password" className="px-3 py-2 rounded-lg border border-slate-300 text-[13px]" placeholder="현재 비밀번호" value={cur} onChange={e=>setCur(e.target.value)}/>
        <input type="password" className="px-3 py-2 rounded-lg border border-slate-300 text-[13px]" placeholder="새 비밀번호(4자+)" value={nw} onChange={e=>setNw(e.target.value)}/>
        <input type="password" className="px-3 py-2 rounded-lg border border-slate-300 text-[13px]" placeholder="새 비밀번호 확인" value={nw2} onChange={e=>setNw2(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") change(); }}/>
      </div>
      <button className="mt-3 px-4 py-2 rounded-lg bg-slate-900 text-white text-[13px] font-bold" onClick={change}>비밀번호 변경</button>
    </div>
  );
}

function PasswordSettings({settings, setSettings}){
  const pwMap = settings.passwords||{};
  const people = useMemo(()=> uniq([...(settings.managers||[]), ...(settings.writers||[])].filter(Boolean)), [settings.managers, settings.writers]);
  const [editing, setEditing] = useState(null);  // name being set
  const [pw, setPw] = useState("");

  const save = (name)=>{
    if(pw.length<4){ alert("비밀번호는 4자 이상으로 설정하세요."); return; }
    setSettings(p=>({...p, passwords:{...(p.passwords||{}), [name]: hashPw(pw)}}));
    setEditing(null); setPw("");
  };
  const clear = (name)=>{
    if(!confirm(`${name}의 비밀번호를 삭제할까요? (다음 결재 시 다시 설정)`)) return;
    setSettings(p=>{ const m={...(p.passwords||{})}; delete m[name]; return {...p, passwords:m}; });
  };

  return (
    <div className="rounded-2xl border border-slate-200 bg-white p-4">
      <div className="font-bold text-slate-700">결재 비밀번호</div>
      <p className="text-[12px] text-slate-400 mt-0.5 mb-3">결재자가 승인할 때 입력하는 비밀번호입니다. 비밀번호는 암호화되어 저장됩니다(평문 저장 안 됨). 미설정 시 첫 결재에서 본인이 직접 설정할 수도 있습니다.</p>
      {people.length===0 ? <p className="text-[12px] text-slate-300">먼저 승인자를 등록하세요.</p> : (
        <div className="space-y-1.5">
          {people.map(name=>{
            const set = !!pwMap[name];
            const isEd = editing===name;
            return (
              <div key={name} className="flex items-center gap-2 py-1.5 border-b border-slate-50 last:border-0">
                <div className="font-semibold text-slate-700 text-[14px] w-28 shrink-0">{name}</div>
                {isEd ? (
                  <>
                    <input type="password" autoFocus className="flex-1 px-3 py-1.5 rounded-lg border border-slate-300 text-[13px]" placeholder="새 비밀번호(4자 이상)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") save(name); }}/>
                    <button className="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-[12px] font-bold" onClick={()=>save(name)}>저장</button>
                    <button className="px-2 py-1.5 text-slate-400 text-[12px]" onClick={()=>{ setEditing(null); setPw(""); }}>취소</button>
                  </>
                ) : (
                  <>
                    <span className={`text-[12px] font-semibold ${set?"text-emerald-600":"text-slate-400"}`}>{set?"● 설정됨":"○ 미설정"}</span>
                    <button className="ml-auto text-[12px] px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 font-semibold" onClick={()=>{ setEditing(name); setPw(""); }}>{set?"변경":"설정"}</button>
                    {set && <button className="text-[12px] px-2 py-1.5 text-rose-400 hover:text-rose-600" onClick={()=>clear(name)}>삭제</button>}
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
