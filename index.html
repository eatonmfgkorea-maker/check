/* Production 보고(MFG Report)가 백업한 FE 생산계획 원본(fePlanRaw) 가져오기 — mfg-settings-*.json */
async function fetchReportPlanRaw(){
  if(!REPORT_GAS_URL) return {ok:false, err:"연동 미설정"};
  try{
    const listRes = await fetch(REPORT_GAS_URL + "?action=list&_=" + Date.now(), {cache:"no-store"});
    const list = await listRes.json();
    if(!list.ok || !Array.isArray(list.files)) return {ok:false, err:"목록 조회 실패"};
    // 1순위: 파이썬 자동 업로드 전용 파일(fe-plan-auto-*), 없으면 2순위: MFGreport 백업(mfg-settings-*)
    let fl = list.files.filter(f=>/fe-plan-auto-/i.test(f.name||"") && !/TEST/i.test(f.name||"")).sort((a,b)=>(b.name||"").localeCompare(a.name||""));
    if(fl.length===0){ fl = list.files.filter(f=>/mfg-settings-/i.test(f.name||"")).sort((a,b)=>(b.name||"").localeCompare(a.name||"")); }
    if(fl.length===0) return {ok:false, err:"백업 없음"};
    const loadRes = await fetch(REPORT_GAS_URL + "?action=load&id=" + encodeURIComponent(fl[0].id) + "&_=" + Date.now(), {cache:"no-store"});
    const j = await loadRes.json();
    if(!j.ok || !j.data) return {ok:false, err:"파일 불러오기 실패"};
    const raw = j.data.fePlanRaw || (j.data.data && j.data.data.fePlanRaw) || null;
    if(!raw || !Array.isArray(raw.rows) || !raw.rows.length) return {ok:false, err:"Report에 계획 원본 없음 (Report 새 버전에서 FE 계획을 한 번 올려야 함)"};

  }catch(e){ return {ok:false, err:String(e)}; }
}

async function makeThumbB64(file, max){
  max = max||1000;
  let src=null, iw=0, ih=0;
  try{ src = await createImageBitmap(file, {imageOrientation:"from-image"}); iw=src.width; ih=src.height; }catch(e){}
  if(!src){
    src = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=URL.createObjectURL(file); });
    iw=src.naturalWidth; ih=src.naturalHeight;
  }
  const sc = Math.min(1, max/Math.max(iw,ih||1));
  const c=document.createElement("canvas"); c.width=Math.max(1,Math.round(iw*sc)); c.height=Math.max(1,Math.round(ih*sc));
  c.getContext("2d").drawImage(src,0,0,c.width,c.height);
  return c.toDataURL("image/jpeg",0.82).split(",")[1];
}
function fileToB64(file){
  return new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=()=>res(String(rd.result).split(",")[1]); rd.onerror=rej; rd.readAsDataURL(file); });
}
async function sendBoardPhotoToTelegram(file, meta){

    await fetch(TELEGRAM_RELAY_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({imageB64:b64, filename:fname, caption:cap})});

}

/* 생산계획 엑셀 직접 파싱 — 계획검토 시트의 라인/품명/품번/주야/일자별 수량을 그대로 가져옴 */
function excelSerialToDateStr(v){
  if(typeof v!=="number" || v<40000) return null;
  const d = new Date(Math.round((v - 25569) * 86400 * 1000));
  // 엑셀 직렬값은 타임존 무관 → UTC 기준으로 읽어야 하루 안 밀림
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
}
function parsePlanExcel(wb){
  // 생산순서 시트 우선: 주간/야간 섹션별로 라인(B=대분류)·날짜별 품번/수량이 이미 분리됨 (New ICV / Old ICV 포함)
  const ws = wb.Sheets["생산순서"];
  if(ws && ws["!ref"]){
    const range = XLSX.utils.decode_range(ws["!ref"]);
    const cell = (r,c)=>{ const x=ws[XLSX.utils.encode_cell({r,c})]; return x?x.v:undefined; };
    let hdrRow=-1;
    for(let r=0;r<=12 && hdrRow<0;r++){ for(let c=0;c<=range.e.c;c++){ const v=cell(r,c); if(typeof v==="number"&&v>40000){hdrRow=r;break;} } }
    if(hdrRow>=0){
      const dateAt={};
      for(let c=0;c<=range.e.c;c++){ const ds=excelSerialToDateStr(cell(hdrRow,c)); if(ds) dateAt[c]=ds; }
      const rows=[]; let shift=null, lastLine="";
      for(let r=0;r<=range.e.r;r++){
        const fcell=String(cell(r,5)||"");
        if(/주간\s*계획/.test(fcell)){ shift="주간"; lastLine=""; continue; }
        if(/야간\s*계획/.test(fcell)){ shift="야간"; lastLine=""; continue; }
        if(!shift) continue;
        const bRaw=String(cell(r,1)||"").trim();
        if(bRaw && bRaw!=="소계" && bRaw!=="ES & GP") lastLine=bRaw;
        const line=lastLine; if(!line) continue;
        for(const cStr in dateAt){
          const c=parseInt(cStr), date=dateAt[c];
          const pno=String(cell(r,c+1)||"").trim();
          const qty=cell(r,c+3);
          const name=String(cell(r,c)||"").trim();
          if(pno && typeof qty==="number" && qty>0) rows.push({date,shift,line,name,pno,qty:Math.round(qty)});
        }
      }
      if(rows.length) return {ok:true, rows, sheet:"생산순서"};
    }
  }
  // 폴백: 계획검토(구버전) — 생산순서가 없을 때만
  const sheetNames = wb.SheetNames || [];
  const target = sheetNames.includes("계획검토") ? ["계획검토"] : sheetNames;
  for(const sn of target){
    const ws2 = wb.Sheets[sn]; if(!ws2 || !ws2["!ref"]) continue;
    const range = XLSX.utils.decode_range(ws2["!ref"]);
    const cell = (r,c)=>{ const x=ws2[XLSX.utils.encode_cell({r,c})]; return x?x.v:undefined; };
    let hr=4, lineCol=6, nameCol=7, pnoCol=8, shiftCol=11;
    const dateCols={};
    for(let c=0; c<=range.e.c; c++){ const ds=excelSerialToDateStr(cell(hr,c)); if(ds) dateCols[c]=ds; }
    if(Object.keys(dateCols).length===0) continue;
    const rows=[];
    for(let r=hr+1; r<=range.e.r; r++){
      const g=String(cell(r,shiftCol)||"").trim();
      let shift=null; if(g.indexOf("주간")>=0) shift="주간"; else if(g.indexOf("야간")>=0) shift="야간"; else continue;
      const pno=String(cell(r,pnoCol)||"").trim(); if(!pno) continue;
      const name=String(cell(r,nameCol)||"").trim();
      let line=String(cell(r,lineCol)||"").trim(); if(line==="-") line="";
      Object.entries(dateCols).forEach(([c,date])=>{ const q=cell(r,parseInt(c)); if(typeof q==="number"&&q>0){ const qi=Math.round(q); if(qi>0) rows.push({date,shift,line,name,pno,qty:qi}); } });
    }
    if(rows.length) return {ok:true, rows, sheet:sn};
  }
  return {ok:false, err:"계획 시트를 해석하지 못했습니다 (생산순서/계획검토 모두 실패)"};
}

/* 생산계획 행에서 품목 마스터(라인/품명/품번) 생성 — 단일 소스 */
function masterFromPlanRows(rows){
  const lines=[...new Set((rows||[]).map(r=>r.line).filter(Boolean))];
  const m=new Map();
  (rows||[]).forEach(r=>{
    if(!r.name) return;
    if(!m.has(r.name)) m.set(r.name,{item:r.name, lineName:r.line||"", partNos:new Set()});
    const e=m.get(r.name);
    if(!e.lineName && r.line) e.lineName=r.line;
    if(r.pno) e.partNos.add(r.pno);
  });
  return {lines, items:[...m.values()].map(e=>({item:e.item, lineName:e.lineName, partNos:[...e.partNos]}))};
}

// 캐시(localStorage/Drive/JSON) 복원: 생산계획 엑셀에서 만든 마스터는 유지, 그 외에는 초기 스냅샷으로
function mergeSettings(cached){
  const base = defaultSettings();
  if(!cached || typeof cached!=="object") return base;
  // 옛 기본 조회시간이 저장돼 있으면 새 기본값으로 자동 갱신
  if(cached.defaultTime==="08:20 ~ 08:30" || cached.defaultTime==="08:20~08:30") cached = {...cached, defaultTime: base.defaultTime};
  const keepPlanMaster = cached.masterSource==="plan" && Array.isArray(cached.items) && cached.items.length>0;
  if(keepPlanMaster) return { ...base, ...cached };
  return { ...base, ...cached, lines: base.lines, items: base.items, masterSource: base.masterSource, masterLoadedAt: base.masterLoadedAt };
}

function briefingPlanText(planData, date, shift){
  const rows = ((planData&&planData.rows)||[]).filter(r=> r.date===date && r.shift===shift);

  const byLine = new Map();

  return [...byLine.entries()].map(([ln,arr])=> `${ln}: ${arr.join(", ")}`).join("  /  ");
}
const uniq = (arr)=>Array.from(new Set(arr));
// 결재 비밀번호용 경량 해시 (cyrb53) — 평문 저장 방지용. 암호학적 강도는 아님(사내용).
function hashPw(str){
  str = "mfgcl:"+String(str);
  let h1=0xdeadbeef, h2=0x41c6ce57;
  for(let i=0;i<str.length;i++){ const ch=str.charCodeAt(i); h1=Math.imul(h1^ch,2654435761); h2=Math.imul(h2^ch,1597334677); }
  h1=Math.imul(h1^(h1>>>16),2246822507); h1^=Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507); h2^=Math.imul(h1^(h1>>>13),3266489909);
  return (4294967296*(2097151&h2)+(h1>>>0)).toString(16);
}

function signImage(name){ return SIGN_IMAGES[String(name||'').trim()] || null; }
// 결재 서명용 손글씨 폰트 — 이름마다 고정 배정(살짝 기울기/크기 변화)
const SIGN_FONTS = ["'Nanum Pen Script'","'Nanum Brush Script'","'Gaegu'","'Gamja Flower'","'Hi Melody'","'Dokdo'","'Yeon Sung'","'Poor Story'","'East Sea Dokdo'","'Single Day'"];
function signStyle(name){
  const h = parseInt(hashPw(name||"x").slice(0,8),16) || 0;
  const font = SIGN_FONTS[h % SIGN_FONTS.length];
  const rot = ((h>>3)%7) - 3;        // -3 ~ 3도
  const size = 21 + ((h>>6)%5);      // 21 ~ 25px (손글씨체는 작게 렌더되어 키움)
  return { fontFamily: font + ", 'Batang', serif", transform:`rotate(${rot}deg)`, fontSize:size+"px", lineHeight:1, color:"#1d4ed8", display:"inline-block", whiteSpace:"nowrap" };
}

function cloneBriefingContent(target, src){
  if(!src) return target;
  return { ...target,
    place: src.place != null ? src.place : target.place,
    absentees: src.absentees != null ? src.absentees : "",
    planDay: src.planDay != null ? src.planDay : "",
    planNight: src.planNight != null ? src.planNight : "",
    notices: Array.isArray(src.notices) ? [...src.notices] : target.notices,
    partIssueDay: src.partIssueDay != null ? src.partIssueDay : "",
    partIssueNight: src.partIssueNight != null ? src.partIssueNight : "",
    deliveries: Array.isArray(src.deliveries) ? src.deliveries.map(d=>({...d})) : [],
    etc: Array.isArray(src.etc) ? [...src.etc] : target.etc,
  };
}

// 유효 양식: 설정에서 수정한 양식이 있으면 그걸, 없으면 기본(TPL)
function effTpl(type, settings){
  const t = settings && settings.templates && settings.templates[type];
  const base = TPL[type];
  if(!t || !Array.isArray(t.items) || !t.items.length) return base;
  return { ...base, doc: t.doc || base.doc, items: t.items };
}
// 문서에 저장된 양식 스냅샷 (구버전 문서는 기본 TPL로 폴백)
function recTpl(r){
  const base = TPL[r.type] || {};
  if(r && r.tpl && Array.isArray(r.tpl.items) && r.tpl.items.length) return { ...base, doc: r.tpl.doc || base.doc, items: r.tpl.items };
  return base;
}

function newRecord(type, settings){
  const base = {
    id: uid(), type, createdAt: nowStr(), updatedAt: nowStr(), status:"draft",
    approval:{ s1:{name:"",approved:false,at:""},
      s2:{name:"", approved:true, at:""},
      s3:{name:(settings&&settings.defaultS3)||"", approved:false, at:""} },
    comments: [],
  };
  if(type==="briefing"){
    return { ...base,
      date: todayStr(), time: BRIEFING_TIME,
      place: settings.places[0]||"FE", writer: settings.writers[0]||"", absentees:"",
      planDay:"", planNight:"",
      notices:[...(settings.notices||DEFAULT_NOTICES)],
      partIssueDay:"", partIssueNight:"",
      deliveries:[], etc:["안전교육 - ","안전구호 - "],
    };
  }
  // 점검표 공통 — 설정의 양식(있으면)을 사용하고, 문서에 스냅샷 저장(이후 양식이 바뀌어도 기존 문서는 그대로)
  const eff = effTpl(type, settings);
  const items={};
  eff.items.forEach(it=>{ items[it.no]={r:"",rm:"",q:""}; });
  const r = { ...base,
    tpl: { doc: eff.doc, items: eff.items.map(it=>({...it})) },
    line:"", name:"", part:"", model:"", shiftLeader:"",
    lot:"", prodDate: todayStr(), shift:"",
    items,
  };
  if(type==="dock"){
    r.samplingSize=""; r.batchNo=""; r.checkDate=todayStr(); r.batchSize="";
    r.productAudit={r:"",rm:""};
  }
  return r;
}

/* ============================================================
   저장소 (localStorage + IndexedDB + Drive)
   ============================================================ */
function idbOpen(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbSet(key,val){ try{ const db=await idbOpen(); await new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readwrite"); tx.objectStore(IDB_STORE).put(val,key); tx.oncomplete=res; tx.onerror=()=>rej(tx.error);}); }catch(e){} }
async function idbGet(key){ try{ const db=await idbOpen(); return await new Promise((res)=>{ const tx=db.transaction(IDB_STORE,"readonly"); const r=tx.objectStore(IDB_STORE).get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>res(undefined);}); }catch(e){ return undefined; } }

async function driveSave(payload){
  if(!GAS_URL) return {ok:false, off:true};
  try{
    const res = await fetch(GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"save", key:"data", data: payload }) });
    const j = await res.json().catch(()=>({ok:true}));
    return {ok:true, ...j};
  }catch(e){ return {ok:false, err:String(e)}; }
}
async function driveLoad(){
  if(!GAS_URL) return {ok:false, off:true};
  try{
    const res = await fetch(GAS_URL + "?action=load&key=data&t=" + Date.now() + "_" + Math.random().toString(36).slice(2), {cache:"no-store"});
    const j = await res.json();
    return {ok:true, data: j.data ?? j};
  }catch(e){ return {ok:false, err:String(e)}; }
}

function loadLocal(key, fallback){ try{ const v=localStorage.getItem(key); return v? JSON.parse(v): fallback; }catch(e){ return fallback; } }
function saveLocal(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
// 결재 유실 방지: 드라이브 records와 로컬 records를 문서 단위로 병합(최신 updatedAt 우선). 한쪽에만 있는 건 유지.
function mergeRecords(localArr, driveArr){
  const byId = {}; let changed = false;
  (Array.isArray(driveArr)?driveArr:[]).forEach(r=>{ if(r&&r.id) byId[r.id]=r; });
  (Array.isArray(localArr)?localArr:[]).forEach(r=>{
    if(!r||!r.id) return;
    const d = byId[r.id];
    if(!d){ byId[r.id]=r; changed=true; return; }               // 로컬에만 있음 → 유지
    const lt = Date.parse(r.updatedAt||r.createdAt||0)||0;
    const dt = Date.parse(d.updatedAt||d.createdAt||0)||0;
    if(lt>dt){ byId[r.id]=r; changed=true; }                    // 로컬이 더 최신 → 로컬 유지
  });
  const merged = Object.values(byId).sort((a,b)=>(Date.parse(b.createdAt||0)||0)-(Date.parse(a.createdAt||0)||0));
  return { merged, changed };
}

const inputCls = "w-full px-3 rounded-lg border border-slate-300 bg-white text-[15px] focus:border-slate-500 focus:ring-2 focus:ring-slate-200 outline-none";

function MasterPicker({lines, items, value, onChange}){
  // 현재 값이 마스터에 없어도(생산계획에서 채워진 품번 등) 옵션에 포함시켜 빈칸으로 보이지 않게 함
  const sortedLines = useMemo(()=>{
    const base=[...(lines||[])];
    if(value.line && !base.includes(value.line)) base.push(value.line);
    return base.sort((a,b)=>a.localeCompare(b));
  }, [lines, value.line]);
  const names = useMemo(()=>{
    const f = value.line ? (items||[]).filter(it=>(it.lineName||"")===value.line) : (items||[]);
    const arr = f.map(it=>it.item);
    if(value.name && !arr.includes(value.name)) arr.push(value.name);
    return arr.sort((a,b)=>a.localeCompare(b));
  }, [items, value.line, value.name]);
  const parts = useMemo(()=>{
    const it = (items||[]).find(x=>x.item===value.name);
    const arr = it ? [...it.partNos] : [];
    if(value.part && !arr.includes(value.part)) arr.push(value.part);
    return arr;
  }, [items, value.name, value.part]);

  return (
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <Field label="라인">
        <select className={inputCls} value={value.line}
          onChange={e=>onChange({ ...value, line:e.target.value, name:"", part:"", model:e.target.value })}>
          <option value="">전체</option>
          {sortedLines.map(l=> <option key={l} value={l}>{l}</option>)}
        </select>
      </Field>
      <Field label="품명" req>
        <select className={inputCls} value={value.name}
          onChange={e=>{
            const it=(items||[]).find(x=>x.item===e.target.value);
            const ln = it && it.lineName ? it.lineName : value.line;
            onChange({ ...value, name:e.target.value, part:"", line: ln, model: ln||value.model });
          }}>
          <option value="">선택</option>
          {names.map(n=> <option key={n} value={n}>{n}</option>)}
        </select>
      </Field>
      <Field label="생산 품번" req>
        <select className={inputCls} value={value.part}
          onChange={e=>onChange({ ...value, part:e.target.value })}>
          <option value="">선택</option>
          {parts.map(p=> <option key={p} value={p}>{p}</option>)}
        </select>
      </Field>
    </div>
  );
}

function StatusBadge({status}){
  const map = { draft:["임시저장","#64748b","#f1f5f9"], pending:["결재 진행","#b45309","#fef3c7"], done:["결재 완료","#047857","#d1fae5"] };
  const [t,c,bg] = map[status]||map.draft;
  return <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{color:c, background:bg}}>{t}</span>;
}

function OkNg({value, onChange, disabled}){
  const btn = (v, label, offCls, onCls) => (
    <button type="button" disabled={disabled}
      onClick={()=>onChange(value===v ? "" : v)}
      className={`flex-1 h-11 rounded-lg text-[13px] font-extrabold border-2 transition-all flex items-center justify-center ${value===v?onCls:offCls}`}>{label}</button>
  );
  return (
    <div className="flex gap-1.5">
      {btn("OK","OK","border-emerald-200 bg-emerald-50 text-emerald-400","border-emerald-600 bg-emerald-600 text-white shadow-md ring-2 ring-emerald-200 scale-[1.03]")}
      {btn("NG","NG","border-rose-200 bg-rose-50 text-rose-300","border-rose-600 bg-rose-600 text-white shadow-md ring-2 ring-rose-200 scale-[1.03]")}
      {btn("NA","N/A","border-slate-200 bg-slate-50 text-slate-300","border-slate-500 bg-slate-500 text-white shadow-md ring-2 ring-slate-200 scale-[1.03]")}
    </div>
  );
}

/* ============================================================
   메인 앱
   ============================================================ */
function App(){
  const [settings, setSettings] = useState(()=>{ const s=loadLocal(LS_SETTINGS,null); return s? mergeSettings(s) : defaultSettings(); });
  const [records, setRecords] = useState(()=>loadLocal(LS_RECORDS, []));
  const [tab, setTab] = useState("list");          // list | plan | cal | board | new | inbox | settings
  const [jumpDate, setJumpDate] = useState("");    // 달력에서 날짜 클릭 → 생산계획으로 이동
  const [editing, setEditing] = useState(null);    // record being edited (object)
  const [viewing, setViewing] = useState(null);    // record being viewed/printed (object)
  const [newVerFound, setNewVerFound] = useState(false);   // 새 버전 감지
  const editingRef = useRef(null), viewingRef = useRef(null);
  useEffect(()=>{ editingRef.current = editing; }, [editing]);
  useEffect(()=>{ viewingRef.current = viewing; }, [viewing]);

  // 새 버전 자동 감지: 서버의 index.html을 캐시 무시하고 받아 APP_VERSION 비교
  useEffect(()=>{
    let stop=false;
    const busy = ()=> !!(editingRef.current || viewingRef.current);
    const checkVer = async()=>{
      try{
        const res = await fetch(location.pathname + "?v=" + Date.now(), {cache:"no-store"});
        const txt = await res.text();
        const m = txt.match(/APP_VERSION\s*=\s*"(V\d+)"/);
        if(!m || stop) return;
        const latest = m[1];
        if(latest !== APP_VERSION){
          if(busy()) setNewVerFound(true);              // 작성/조회 중이면 배너만
          else location.reload(true);                    // 아니면 즉시 갱신
        }
      }catch(e){ /* 네트워크 오류 무시 */ }
    };
    const t0 = setTimeout(checkVer, 3000);              // 켠 뒤 3초 후 1회
    const iv = setInterval(checkVer, 5*60*1000);        // 이후 5분마다
    return ()=>{ stop=true; clearTimeout(t0); clearInterval(iv); };
  }, []);
  const [sync, setSync] = useState({state: GAS_URL?"idle":"local", msg:""});
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const loadedRef = useRef(false);
  const fileRef = useRef(null);

  // 결재 요청 메일 발송 (여러 건을 한 통으로). 등록 이메일/GAS 없으면 건너뜀.
  const sendApprovalMail = useCallback((to, toName, recs)=>{
    if(!GAS_URL || !to || !recs || !recs.length) return;
    const mail = buildApprovalListMail(recs, toName);
    fetch(GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"mail", to, subject:mail.subject, html:mail.html, text:mail.text }) }).catch(()=>{});
  }, []);

  // 생산계획 (Production 보고 자동 연동 + 직접 업로드 폴백. 품목 마스터도 여기서 생성)
  const [planData, setPlanData] = useState(()=> loadLocal(LS_PLAN, {rows:[], file:"", uploadedAt:"", source:""}));
  const [reportSync, setReportSync] = useState({state:"idle", msg:""});
  const planRef = useRef(planData);
  useEffect(()=>{ planRef.current = planData; }, [planData]);

  const applyPlanRows = useCallback((rows, file, uploadedAt, source, maps)=>{
    const icvAssign = (maps&&maps.icvAssign)||[];
    rows = splitIcvRows(rows, icvAssign);   // "New ICV / Old ICV" → 인원편성 배정대로 New/Old 분리
    setPlanData({rows, file:file||"", uploadedAt:uploadedAt||nowStr(), source:source||"",
      revMap:(maps&&maps.revMap)||{}, lineCodes:(maps&&maps.lineCodes)||{}, icvAssign});
    // 품목 마스터(라인/품명/품번)도 같은 데이터에서 생성 → 계획·작성 드롭다운이 항상 일치
    const m = masterFromPlanRows(rows);
    setSettings(prev=>({...prev, lines:m.lines, items:m.items, masterSource:"plan", masterLoadedAt:nowStr()}));
    return m;
  }, []);

  // Production 보고 백업에서 자동으로 가져오기
  const loadReportPlan = useCallback(async(manual)=>{
    setReportSync({state:"loading", msg:"Report에서 가져오는 중…"});
    const r = await fetchReportPlanRaw();
    if(r.ok){
      try{ localStorage.setItem(LS_PLAN_SYNC, String(Date.now())); }catch(e){}
      const remoteAt = r.raw.uploadedAt||"";
      const cur = planRef.current||{};
      const shouldApply = manual || !(cur.rows&&cur.rows.length) || (remoteAt && remoteAt > (cur.uploadedAt||""));
      if(shouldApply){
        const m = applyPlanRows(r.raw.rows, r.raw.file||"(Report)", remoteAt, "report", {revMap:r.raw.revMap, lineCodes:r.raw.lineCodes, icvAssign:r.raw.icvAssign});
        setReportSync({state:"ok", msg:`연동됨 · ${r.file||""} · 라인 ${m.lines.length}`});
      } else {
        setReportSync({state:"ok", msg:`로컬이 최신 (보고:${r.file||""})`});
      }
    } else {
      setReportSync({state:"err", msg:r.err||"가져오기 실패"});
    }
  }, [applyPlanRows]);

  // 캐시 통째로 비우고 보고에서 강제로 다시 받기 (끈질긴 옛 캐시 제거용)
  const hardRefreshReport = useCallback(async()=>{
    try{ localStorage.removeItem(LS_PLAN); }catch(e){}
    try{ await idbSet(LS_PLAN, null); }catch(e){}
    setPlanData({rows:[], file:"", uploadedAt:"", source:"", revMap:{}, lineCodes:{}, icvAssign:[]});
    await loadReportPlan(true);
  }, [loadReportPlan]);

  const uploadPlanFile = useCallback((file)=>{
    const rd=new FileReader();
    rd.onload=()=>{ try{
      const wb = XLSX.read(rd.result, {type:"array"});
      const r = parsePlanExcel(wb);
      if(!r.ok){ alert(r.err||"계획 파일을 해석하지 못했습니다."); return; }
      const m = applyPlanRows(r.rows, file.name, nowStr(), "upload", {...extractLotMaps(wb), icvAssign:parseIcvAssignCl(wb)});
      alert(`생산계획 ${r.rows.length}건 불러옴 (${r.sheet} 시트)\n품목 마스터 갱신: 라인 ${m.lines.length} · 품명 ${m.items.length}`);
    }catch(e){ alert("파일을 읽지 못했습니다: "+e); } };
    rd.readAsArrayBuffer(file);
  }, [applyPlanRows]);
  // 생산계획에서 점검표 바로 작성 (품번/품명/라인/날짜 미리 채움)
  // 현황판 사진 (라인·날짜·주야당 1장)
  const [photos, setPhotos] = useState({list:[], state:"idle"});
  const thumbCache = useRef(new Map());
  const loadPhotos = useCallback(async()=>{
    if(!GAS_URL) return;
    setPhotos(p=>({...p, state:"loading"}));
    const r = await apiPhotoList();
    if(r && r.ok) setPhotos({list:r.files||[], state:"ok"});
    else setPhotos(p=>({...p, state:"err"}));
  }, []);
  const getThumb = useCallback(async(id)=>{
    if(!id) return "";
    if(thumbCache.current.has(id)) return thumbCache.current.get(id);
    const r = await apiPhotoGet(id);
    if(r && r.ok){ const u = `data:${r.mime||"image/jpeg"};base64,${r.data}`; thumbCache.current.set(id,u); return u; }
    return "";
  }, []);
  const uploadBoardPhoto = useCallback(async(file, meta)=>{
    const r = await apiPhotoUpload(file, meta);
    if(r && r.ok){ sendBoardPhotoToTelegram(file, meta); await loadPhotos(); return true; }
    alert("사진 업로드 실패: "+((r&&r.err)||"연결 오류")); return false;
  }, [loadPhotos]);
  const downloadPhoto = useCallback(async(p)=>{
    const r = await apiPhotoGet(p.id);
    if(!(r&&r.ok)){ alert("원본을 받지 못했습니다."); return; }
    const bin = atob(r.data); const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    const blob = new Blob([arr], {type:r.mime||"image/jpeg"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=r.name||p.name||"photo.jpg"; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, []);
  const deleteBoardPhoto = useCallback(async(p)=>{
    const pw = prompt("현황판 사진 삭제는 관리자만 가능합니다.\n관리자 비밀번호를 입력하세요.");
    if(pw===null) return;
    if(hashPw(pw)!==settings.adminPw){ alert("관리자 비밀번호가 일치하지 않습니다."); return; }
    const r = await apiPhotoDel(p.id, p.thumbId);
    if(r && r.ok) await loadPhotos(); else alert("삭제 실패");
  }, [settings.adminPw, loadPhotos]);
  useEffect(()=>{ loadPhotos(); }, []);

  const createFromPlan = useCallback((type, p)=>{
    let rec = newRecord(type, settings);
    if(type==="briefing"){
      const latest = records.filter(x=>x.type==="briefing")
        .sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.createdAt||"").localeCompare(a.createdAt||""))[0];
      if(latest) rec = cloneBriefingContent(rec, latest);
      rec.date = p.date;
      if(p.writer) rec.writer = p.writer;   // 선택한 작성자 자동 반영
      // 그날 생산계획(주간/야간)을 라인별 품명으로 자동 채움
      rec.planDay = briefingPlanText(planRef.current, p.date, "주간");
      rec.planNight = briefingPlanText(planRef.current, p.date, "야간");
    } else {
      rec.line = p.line||""; rec.name = p.name||""; rec.part = p.pno||""; rec.model = p.line||rec.model||"";
      rec.shift = p.shift||"";
      if(p.writer){ rec.writer = p.writer; rec.shiftLeader = p.writer; rec.approval.s1.name = p.writer; }   // 선택한 작성자 자동 반영
      if(type==="dock") rec.checkDate = p.date; else rec.prodDate = p.date;
      // LOT 자동계산 (엑셀 오라클 바코드 규칙) — 수정 가능
      const lot = calcLot(planRef.current, {date:p.date, shift:p.shift, line:p.line, pno:p.pno});
      if(lot){ if(type==="dock") rec.batchNo = lot; else rec.lot = lot; }
    }
    setEditing(rec);
  }, [settings, records]);

  // 메일 링크(#inbox)로 들어오면 결재함 탭 자동 열기
  useEffect(()=>{ if((location.hash||"").toLowerCase().indexOf("inbox")>=0) setTab("inbox"); }, []);

  // QR 라인 모드: #line=Auto%20GVV (라인명) 또는 #line=AGV (라인코드) → 생산계획 탭, 해당 라인만
  const [lineFocus, setLineFocus] = useState(()=>{
    try{ const m = decodeURIComponent(location.hash||"").match(/line=([^&#]+)/); return m?m[1].trim():""; }catch(e){ return ""; }
  });
  useEffect(()=>{ if(lineFocus) setTab("plan"); }, []);
  const clearLineFocus = ()=>{ setLineFocus(""); try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){} };

  // 초기 Drive 동기화 (Drive 우선)
  useEffect(()=>{
    (async()=>{
      const idbR = await idbGet(LS_RECORDS); const idbS = await idbGet(LS_SETTINGS); const idbP = await idbGet(LS_PLAN);
      if(Array.isArray(idbR) && idbR.length && records.length===0) setRecords(idbR);
      if(idbS) setSettings(mergeSettings(idbS));
      if(idbP && Array.isArray(idbP.rows) && idbP.rows.length) setPlanData(p=> (p.rows&&p.rows.length)?p:idbP);
      if(GAS_URL){
        setSync({state:"loading", msg:"동기화 중…"});
        const r = await driveLoad();
        if(r.ok && r.data && Array.isArray(r.data.records)){
          setRecords(local=>{ const mr = mergeRecords(local, r.data.records); if(mr.changed) needPushRef.current = true; return mr.merged; });
          if(r.data.settings) setSettings(mergeSettings(r.data.settings));
          if(r.data.planData && Array.isArray(r.data.planData.rows)) setPlanData(r.data.planData);
          setSync({state:"ok", msg:"동기화됨"});
        } else if(r.ok){
          // 드라이브 백업이 없거나 손상됨 → 이 기기의 로컬 데이터로 즉시 복구 저장
          const effR = (Array.isArray(idbR)&&idbR.length) ? idbR : records;
          const effS = idbS ? mergeSettings(idbS) : settings;
          const effP = (idbP&&Array.isArray(idbP.rows)&&idbP.rows.length) ? idbP : planData;
          if((effR&&effR.length) || (effP&&effP.rows&&effP.rows.length)){
            const sv = await driveSave({records:effR, settings:effS, planData:effP, ver:APP_VERSION});
            setSync({state: sv.ok?"ok":"err", msg: sv.ok?"백업 복구됨":"동기화 실패"});
          } else {
            setSync({state:"ok", msg:"새 백업"});
          }
        } else setSync({state: r.off?"local":"err", msg: r.off?"":"동기화 실패"});
      }
      loadedRef.current = true;
      if(needPushRef.current){ needPushRef.current = false; setSaveNudge(n=>n+1); }   // 못 올라갔던 결재분 복구 저장
      // Production 보고에서 생산계획 원본 자동 가져오기 — 최근에 받았으면 네트워크 생략(캐시 즉시 사용, QR 반복 스캔 대응)
      (()=>{
        const cur = planRef.current||{};
        const hasCached = !!(cur.rows && cur.rows.length);
        let syncedAt = 0; try{ syncedAt = parseInt(localStorage.getItem(LS_PLAN_SYNC)||"0",10)||0; }catch(e){}
        const fresh = hasCached && (Date.now()-syncedAt < 10*60*1000);  // 10분 이내면 생략
        if(fresh){ setReportSync({state:"ok", msg:"연동됨 (캐시)"}); return; }
        loadReportPlan(false);  // 보고가 캐시보다 '더 최신일 때만' 반영
      })();
    })();
  // eslint-disable-next-line
  }, []);

  // 저장 (local + idb 즉시, Drive 디바운스)
  useEffect(()=>{ saveLocal(LS_RECORDS, records); idbSet(LS_RECORDS, records); }, [records]);
  useEffect(()=>{ saveLocal(LS_SETTINGS, settings); idbSet(LS_SETTINGS, settings); }, [settings]);
  useEffect(()=>{ saveLocal(LS_PLAN, planData); idbSet(LS_PLAN, planData); }, [planData]);
  const [saveNudge, setSaveNudge] = useState(0);
  const retryRef = useRef(false);
  const needPushRef = useRef(false);   // 병합으로 로컬 변경분이 생기면 드라이브에 밀어주기
  useEffect(()=>{
    if(!loadedRef.current || !GAS_URL) return;
    const h = setTimeout(async()=>{
      setSync(s=>({...s, state:"saving"}));
      const r = await driveSave({records, settings, planData, ver:APP_VERSION});
      if(!r.ok && !retryRef.current){
        retryRef.current = true;
        setTimeout(()=>{ retryRef.current=false; setSaveNudge(n=>n+1); }, 8000);   // 1회 자동 재시도
      }
      setSync({state: r.ok?"ok":"err", msg: r.ok?"저장됨":"저장 실패"});
    }, 1200);
    return ()=>clearTimeout(h);
  }, [records, settings, planData, saveNudge]);

  // 액션
  const saveNow = useCallback(async(arr)=>{   // 디바운스 안 기다리고 즉시 드라이브 저장 (결재 유실 방지)
    if(!GAS_URL) return;
    setSync(s=>({...s, state:"saving"}));
    const r = await driveSave({records:arr, settings, planData, ver:APP_VERSION});
    if(!r.ok && !retryRef.current){ retryRef.current=true; setTimeout(()=>{ retryRef.current=false; setSaveNudge(n=>n+1); }, 6000); }
    setSync({state: r.ok?"ok":"err", msg: r.ok?"저장됨":"저장 실패"});
  }, [settings, planData]);
  const upsert = useCallback((rec)=>{
    rec.updatedAt = nowStr();
    setRecords(prev=>{ const i=prev.findIndex(r=>r.id===rec.id); const next = i<0? [rec,...prev] : prev.map((x,ix)=>ix===i?rec:x); queueMicrotask(()=>saveNow(next)); return next; });
  }, [saveNow]);
  const removeRec = useCallback((id)=>{
    const pw = prompt("문서 삭제는 관리자만 가능합니다.\n관리자 비밀번호를 입력하세요.");
    if(pw===null) return;
    if(hashPw(pw)!==settings.adminPw){ alert("관리자 비밀번호가 일치하지 않습니다."); return; }
    if(!confirm("이 문서를 삭제할까요? (되돌릴 수 없습니다)")) return;
    setRecords(prev=>prev.filter(r=>r.id!==id));
  }, [settings.adminPw]);

  function approveMany(targets, opts){
    opts = opts||{};
    setRecords(prev=>{ const next = prev.map(r=>{
      const t = targets.find(x=>x.id===r.id);
      if(!t) return r;
      const a = { s1:{...r.approval.s1}, s2:{...r.approval.s2}, s3:{...r.approval.s3} };
      // 단일 승인: 작성/검토는 자동 처리, 승인(s3)만 결재
      if(!a.s1.approved) a.s1={...a.s1, approved:true, at:a.s1.at||nowStr()};
      if(!a.s2.approved) a.s2={...a.s2, approved:true, at:a.s2.at||""};
      a.s3={...a.s3, approved:true, at:nowStr()};
      let comments = Array.isArray(r.comments) ? [...r.comments] : [];
      if(opts.comment && opts.comment.trim()){
        const L = roleLabels(r.type);
        comments.push({ name: opts.name || a.s3.name, role: L[2], text: opts.comment.trim(), at: nowStr() });
      }
      const done = a.s1.approved && a.s2.approved && a.s3.approved;
      return {...r, approval:a, comments, status: done?"done":"pending", updatedAt:nowStr()};
    }); queueMicrotask(()=>saveNow(next)); return next; });
  }
  const setPwForPerson = useCallback((name, hash)=>{
    setSettings(prev=>({...prev, passwords:{...(prev.passwords||{}), [name]: hash}}));
  }, []);

  function exportJson(){
    const blob = new Blob([JSON.stringify({records,settings,planData,ver:APP_VERSION},null,2)], {type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`점검조회_백업_${todayStr()}.json`; a.click();
  }
  function importJson(file){
    const rd=new FileReader();
    rd.onload=()=>{ try{ const j=JSON.parse(rd.result);
      if(Array.isArray(j.records)) setRecords(j.records);
      if(j.settings) setSettings(mergeSettings(j.settings));
      if(j.planData && Array.isArray(j.planData.rows)) setPlanData(j.planData);
      alert("불러오기 완료");
    }catch(e){ alert("파일을 읽지 못했습니다."); } };
    rd.readAsText(file);
  }

  const pendingCount = useMemo(()=>records.filter(r=>r.status==="pending").length, [records]);

  // 화면
  if(viewing){
    return <Viewer rec={viewing} settings={settings} onClose={()=>setViewing(null)} />;
  }
  if(editing){
    return <Editor rec={editing} settings={settings} records={records} planData={planData}
      onCancel={()=>setEditing(null)}
      onSaveDraft={(r)=>{ r.status="draft"; upsert(r); setEditing(null); setTab("list"); }}
      onSubmit={(r)=>{ r.status="pending";
        r.approval.s1={name:r.approval.s1.name||r.shiftLeader||r.writer||"", approved:true, at:nowStr()};
        r.approval.s2={name:r.approval.s2.name||"", approved:true, at:r.approval.s2.at||""};
        upsert(r);
        { const nm=r.approval.s3.name, to=(settings.emails||{})[nm]; if(to) sendApprovalMail(to, nm, [r]); }
        setEditing(null); setTab("inbox"); }}
    />;
  }

  return (
    <div className="min-h-screen pb-24">
      {newVerFound && (
        <div className="sticky top-0 z-40 bg-indigo-600 text-white px-4 py-2.5 flex items-center justify-between gap-3 no-print">
          <div className="text-[13px] font-bold">🔄 새 버전이 있습니다. 작성 완료 후 업데이트해 주세요.</div>
          <button onClick={()=>location.reload(true)}
            className="px-3 py-1.5 rounded-lg bg-white text-indigo-700 text-[12px] font-extrabold whitespace-nowrap">지금 업데이트</button>
        </div>
      )}
      {/* 상단바 */}
      <header className="sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-slate-200">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-9 h-9 rounded-xl bg-slate-900 text-white grid place-items-center font-black text-[13px]">CL</div>
            <div>
              <div className="font-extrabold text-slate-800 leading-tight">현장 점검표 · 조회일지</div>
              <div className="text-[11px] text-slate-400 leading-tight">{APP_VERSION} · 전자결재</div>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <SyncDot sync={sync}/>
            <div className="relative">
              <button className="text-[12px] text-slate-500 hover:text-slate-800" onClick={()=>fileRef.current.click()}>가져오기</button>
              <input ref={fileRef} type="file" accept="application/json" className="hidden"
                onChange={e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; }}/>
            </div>
            <button className="text-[12px] text-slate-500 hover:text-slate-800" onClick={exportJson}>내보내기</button>
          </div>
        </div>
        {/* 탭 */}
        <nav className="max-w-5xl mx-auto px-2 flex gap-1 overflow-x-auto">
          {[["list","목록"],["plan","생산계획"],["cal","달력"],["board","현황판"],["new","작성"],["inbox","결재함"],["settings","설정"]].map(([k,t])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={`px-4 py-2.5 text-[14px] font-bold whitespace-nowrap border-b-2 ${tab===k?"border-slate-900 text-slate-900":"border-transparent text-slate-400"}`}>
              {t}{k==="inbox" && pendingCount>0 && <span className="ml-1.5 text-[11px] bg-rose-500 text-white rounded-full px-1.5 py-0.5">{pendingCount}</span>}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-5xl mx-auto px-4 pt-5">
        {tab==="list" && <ListView records={records} onOpen={setViewing} onEdit={setEditing} onDelete={removeRec} />}
        {tab==="plan" && <PlanView records={records} settings={settings}
          planData={planData} onUploadPlan={uploadPlanFile}
          reportSync={reportSync} onReloadReport={()=>loadReportPlan(true)} onHardRefresh={hardRefreshReport}
          lineFocus={lineFocus} onClearFocus={clearLineFocus} adminUnlocked={adminUnlocked} jumpDate={jumpDate}
          photos={photos} onUploadPhoto={uploadBoardPhoto} getThumb={getThumb}
          onDownloadPhoto={downloadPhoto} onDeletePhoto={deleteBoardPhoto}
          onCreate={createFromPlan} onOpen={setViewing} onEdit={setEditing} />}
        {tab==="cal" && <CalendarView records={records} planData={planData} photos={photos}
          onPickDate={(d)=>{ setJumpDate(d); setTab("plan"); }} />}
        {tab==="board" && <BoardView photos={photos} onReload={loadPhotos} getThumb={getThumb}
          onDownload={downloadPhoto} onDelete={deleteBoardPhoto}
          masterLines={settings.lines||[]} onUpload={uploadBoardPhoto} />}
        {tab==="new" && <NewView settings={settings} onPick={(type)=>{
          let rec = newRecord(type, settings);
          if(type==="briefing"){
            const latest = records.filter(x=>x.type==="briefing")
              .sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.createdAt||"").localeCompare(a.createdAt||""))[0];
            if(latest) rec = cloneBriefingContent(rec, latest);
          }
          setEditing(rec);
        }} />}
        {tab==="inbox" && <InboxView records={records} onApprove={approveMany} onOpen={setViewing}
          passwords={settings.passwords||{}} onSetPassword={setPwForPerson} />}
        {tab==="settings" && (adminUnlocked
          ? <SettingsView settings={settings} setSettings={setSettings} planData={planData} />
          : <AdminGate adminPw={settings.adminPw} onUnlock={()=>setAdminUnlocked(true)} onCancel={()=>setTab("list")} />
        )}
      </main>
    </div>
  );
}

function SyncDot({sync}){
  const map = { local:["#94a3b8","로컬 저장"], idle:["#94a3b8","대기"], loading:["#0ea5e9","동기화 중"], saving:["#0ea5e9","저장 중"], ok:["#22c55e","동기화됨"], err:["#ef4444","오류"] };
  const [c,t]=map[sync.state]||map.idle;
  return <div className="flex items-center gap-1.5 text-[11px] text-slate-400"><span className="w-2 h-2 rounded-full" style={{background:c}}/>{t}</div>;
}

/* ============================================================
   목록
   ============================================================ */
function rowDate(r){
  if(r.type==="briefing") return fmtDate(r.date);
  if(r.type==="dock") return fmtDate(r.checkDate||r.prodDate||r.createdAt);
  return fmtDate(r.prodDate||r.createdAt);
}
function statusText(r){ return r.status==="done"?"결재 완료": r.status==="pending"?"결재 진행":"임시저장"; }

function ListView({records, onOpen, onEdit, onDelete}){
  const [q, setQ] = useState("");
  const [filters, setFilters] = useState({});   // { key: Set(선택된 값) }  (없으면 전체)
  const [openCol, setOpenCol] = useState(null);
  const [colQ, setColQ] = useState("");
  const [sort, setSort] = useState({key:"date", dir:"desc"});

  const cols = useMemo(()=>[
    {key:"date",  label:"날짜",   w:"100px", get:r=> rowDate(r)||"(없음)"},
    {key:"type",  label:"점검표", w:"118px", get:r=> TYPE_META[r.type].label},
    {key:"line",  label:"라인",   w:"120px", get:r=> (r.type==="briefing"?(r.place||""):(r.line||""))||"(없음)"},
    {key:"item",  label:"아이템", w:"auto",  get:r=> (r.type==="briefing"?"(조회일지)":(r.name||""))||"(없음)"},
    {key:"lot",   label:"Lot",   w:"120px", get:r=> r.type==="briefing"?"-":(lotOf(r)||"(없음)")},
    {key:"status",label:"결재",   w:"96px",  get:r=> statusText(r)},
  ], []);

  const distinct = useMemo(()=>{
    const d={};
    cols.forEach(c=>{ d[c.key]=Array.from(new Set(records.map(r=>c.get(r)))).sort((a,b)=>String(a).localeCompare(String(b),"ko")); });
    return d;
  }, [records, cols]);

  const rows = useMemo(()=>{
    let r=[...records];
    if(q.trim()){ const s=q.trim().toLowerCase(); r=r.filter(x=> cols.map(c=>c.get(x)).join(" ").toLowerCase().includes(s) || [x.part,x.writer,x.shiftLeader].filter(Boolean).join(" ").toLowerCase().includes(s)); }
    Object.entries(filters).forEach(([k,set])=>{
      if(set && set.size){ const col=cols.find(c=>c.key===k); r=r.filter(x=> set.has(col.get(x))); }
    });
    const col=cols.find(c=>c.key===sort.key)||cols[0];
    r.sort((a,b)=>{ const cmp=String(col.get(a)).localeCompare(String(col.get(b)),"ko"); return sort.dir==="desc"?-cmp:cmp; });
    return r;
  }, [records, q, filters, sort, cols]);

  const toggleVal=(key,val)=> setFilters(prev=>{
    const all=distinct[key]; let cur=prev[key]?new Set(prev[key]):new Set(all);
    if(cur.has(val)) cur.delete(val); else cur.add(val);
    const n={...prev}; if(cur.size===all.length) delete n[key]; else n[key]=cur; return n;
  });
  const colAll=(key)=> setFilters(prev=>{ const n={...prev}; delete n[key]; return n; });
  const colNone=(key)=> setFilters(prev=>({...prev, [key]:new Set()}));
  const setSortKey=(key)=> setSort(s=> s.key===key? {key, dir:s.dir==="asc"?"desc":"asc"} : {key, dir:"asc"});
  const openColMenu=(key)=>{ setOpenCol(openCol===key?null:key); setColQ(""); };

  return (
    <div>
      <div className="flex items-center gap-2 mb-3">
        <input className="flex-1 min-w-[140px] px-3 py-2 rounded-lg border border-slate-300 bg-white text-[13px]" placeholder="검색 (아이템·품번·작성자 등)" value={q} onChange={e=>setQ(e.target.value)}/>
        <span className="text-[12px] text-slate-400 whitespace-nowrap">{rows.length}건</span>
        {Object.keys(filters).length>0 && <button onClick={()=>setFilters({})} className="text-[12px] px-2.5 py-2 rounded-lg border border-slate-300 text-slate-500 whitespace-nowrap">필터 초기화</button>}
      </div>

      {openCol && <div className="fixed inset-0 z-20" onClick={()=>setOpenCol(null)}/>}

      <div className="overflow-x-auto rounded-2xl border border-slate-200 bg-white">
        <table className="w-full text-[13px]" style={{minWidth:"700px"}}>
          <thead>
            <tr className="bg-slate-50 border-b-2 border-slate-200">
              {cols.map(c=>{
                const active = !!filters[c.key];
                const list = distinct[c.key].filter(v=> !colQ.trim() || String(v).toLowerCase().includes(colQ.trim().toLowerCase()));
                return (
                  <th key={c.key} style={{width:c.w}} className="text-left px-2 py-2 font-bold text-slate-600 relative align-middle">
                    <div className="flex items-center gap-1">
                      <button className="hover:text-slate-900 whitespace-nowrap" onClick={()=>setSortKey(c.key)}>{c.label}{sort.key===c.key?(sort.dir==="asc"?" ▲":" ▼"):""}</button>
                      <button className={`ml-auto w-5 h-5 grid place-items-center rounded text-[11px] ${active?"text-sky-600 bg-sky-100":"text-slate-400 hover:bg-slate-200"}`} onClick={()=>openColMenu(c.key)}>▾</button>
                    </div>
                    {openCol===c.key && (
                      <div className="absolute z-30 left-0 top-full mt-1 w-48 bg-white border border-slate-200 rounded-lg shadow-xl p-2 text-[12px] font-normal" onClick={e=>e.stopPropagation()}>
                        <input autoFocus className="w-full px-2 py-1 mb-1.5 rounded border border-slate-200 text-[12px]" placeholder="값 검색" value={colQ} onChange={e=>setColQ(e.target.value)}/>
                        <div className="flex gap-1 mb-1.5">
                          <button className="flex-1 px-2 py-1 rounded bg-slate-100 text-slate-600 font-semibold" onClick={()=>colAll(c.key)}>전체</button>
                          <button className="flex-1 px-2 py-1 rounded bg-slate-100 text-slate-600 font-semibold" onClick={()=>colNone(c.key)}>해제</button>
                        </div>
                        <div className="max-h-52 overflow-auto">
                          {list.map(v=>{
                            const checked = !filters[c.key] || filters[c.key].has(v);
                            return (
                              <label key={v} className="flex items-center gap-2 px-1.5 py-1 rounded hover:bg-slate-50 cursor-pointer">
                                <input type="checkbox" checked={checked} onChange={()=>toggleVal(c.key,v)}/>
                                <span className="truncate">{v}</span>
                              </label>
                            );
                          })}
                          {list.length===0 && <div className="text-slate-300 px-1.5 py-2">결과 없음</div>}
                        </div>
                      </div>
                    )}
                  </th>
                );
              })}
              <th className="px-2 py-2 w-[88px]"></th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id} className="border-b border-slate-100 hover:bg-slate-50 cursor-pointer" onClick={()=>onOpen(r)}>
                <td className="px-2 py-2 text-slate-500 whitespace-nowrap">{rowDate(r)}</td>
                <td className="px-2 py-2"><span className="text-[11px] font-bold px-1.5 py-0.5 rounded whitespace-nowrap" style={{color:TYPE_META[r.type].accent, background:TYPE_META[r.type].soft}}>{TYPE_META[r.type].label}</span></td>
                <td className="px-2 py-2 text-slate-700 whitespace-nowrap">{r.type==="briefing"?(r.place||"-"):(r.line||"-")}</td>
                <td className="px-2 py-2 font-semibold text-slate-800"><div className="truncate max-w-[220px]">{r.type==="briefing"?"—":(r.name||"-")}</div></td>
                <td className="px-2 py-2 text-slate-500 whitespace-nowrap">{r.type==="briefing"?"—":(lotOf(r)||"-")}</td>
                <td className="px-2 py-2"><StatusBadge status={r.status}/></td>
                <td className="px-2 py-2" onClick={e=>e.stopPropagation()}>
                  <div className="flex gap-1 justify-end">
                    {r.status!=="done" && <button className="px-2 py-1 rounded border border-slate-200 text-[12px] text-slate-500 hover:bg-slate-100" onClick={()=>onEdit(r)}>수정</button>}
                    <button className="px-2 py-1 rounded border border-slate-200 text-[12px] text-slate-400 hover:text-rose-500" onClick={()=>onDelete(r.id)}>삭제</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {rows.length===0 && <div className="text-center text-slate-400 py-16 text-[14px]">조건에 맞는 문서가 없습니다.</div>}
      </div>
    </div>
  );
}

/* ============================================================
   생산계획 (MFG Report 백업 연동) — 오늘 생산 품목별 점검표 현황/작성

function ThumbImg({id, getThumb, className, onClick}){
  const [url, setUrl] = useState("");
  useEffect(()=>{ let on=true; if(id) getThumb(id).then(u=>{ if(on) setUrl(u); }); return ()=>{ on=false; }; }, [id]);
  if(!url) return <div className={(className||"")+" bg-slate-100 animate-pulse grid place-items-center text-slate-300 text-[11px]"} onClick={onClick}>로딩…</div>;
  return <img src={url} className={className} onClick={onClick} loading="lazy"/>;
}

const FULL_IMG_CACHE = new Map();   // 원본 이미지 캐시 (최근 4장)
function PhotoViewer({p, getThumb, onDownload, onDelete, onClose}){
  const [thumbUrl, setThumbUrl] = useState("");
  const [fullUrl, setFullUrl] = useState(()=> FULL_IMG_CACHE.get(p.id) || "");
  useEffect(()=>{ let on=true;
    if(p.thumbId) getThumb(p.thumbId).then(u=>{ if(on) setThumbUrl(u); });
    if(!FULL_IMG_CACHE.has(p.id)){
      apiPhotoGet(p.id).then(r=>{
        if(!(r&&r.ok)) return;
        const u = `data:${r.mime||"image/jpeg"};base64,${r.data}`;
        FULL_IMG_CACHE.set(p.id, u);
        while(FULL_IMG_CACHE.size>4){ FULL_IMG_CACHE.delete(FULL_IMG_CACHE.keys().next().value); }
        if(on) setFullUrl(u);
      });
    }
    return ()=>{ on=false; };
  }, [p.id]);
  const src = fullUrl || thumbUrl;
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl p-4 w-full max-w-3xl shadow-xl" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-2 mb-3">
          <div>
            <div className="font-extrabold text-slate-800 text-[15px]">📷 {p.line||"-"} 현황판</div>
            <div className="text-[12px] text-slate-400">{fmtDate(p.date)} · {p.shift} {p.size?`· ${(p.size/1024/1024).toFixed(1)}MB`:""}</div>
          </div>
          {!fullUrl && <span className="ml-2 text-[11px] font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded-lg animate-pulse">원본 화질 불러오는 중…</span>}
          {fullUrl && <span className="ml-2 text-[11px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg">원본 화질</span>}
          <button onClick={onClose} className="ml-auto w-8 h-8 rounded-lg grid place-items-center text-slate-400 hover:bg-slate-100">✕</button>
        </div>
        {src ? <img src={src} className="w-full max-h-[70vh] object-contain rounded-xl bg-slate-50"/>
             : <div className="w-full h-64 rounded-xl bg-slate-100 animate-pulse"/>}
        <div className="mt-3 flex gap-2">
          <button onClick={()=>onDownload(p)} className="flex-1 py-2.5 rounded-xl bg-slate-900 text-white font-bold text-[13.5px]">⬇ 원본 다운로드</button>
          <button onClick={onDelete} className="px-4 py-2.5 rounded-xl border border-rose-200 text-rose-500 font-bold text-[13.5px]">삭제</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   현황판 탭 — 라인/날짜/주야 조회

/* ── 달력: 날짜별 완료 현황(Start Up · Dock Audit · 현황판) 한눈에 ── */
function CalendarView({records, planData, photos, onPickDate}){
  const [ym, setYm] = useState(()=> todayStr().slice(0,7));
  const [sel, setSel] = useState("");
  const hasPlan = !!(planData && Array.isArray(planData.rows) && planData.rows.length);

  const recOf = (type, row)=> records.find(r=> r.type===type && samePno(r.part, row.pno) &&
    fmtDate(type==="dock" ? (r.checkDate||r.prodDate||r.createdAt) : (r.prodDate||r.createdAt)) === row.date &&
    (!r.shift || r.shift===row.shift) &&
    (!r.line || !row.line || normLine(r.line)===normLine(row.line)));
  const photoOf = (line, date, shift)=> ((photos&&photos.list)||[])
    .find(p=> p.date===date && p.shift===shift && normLine(p.line)===normLine(line));

  // 이 달의 날짜별 계획 행 (주야·라인·품번 단위)
  const byDate = useMemo(()=>{
    const m = {};
    if(!hasPlan) return m;
    planData.rows.forEach(row=>{
      if(!row.date || String(row.date).slice(0,7)!==ym) return;
      const d = row.date;
      if(!m[d]) m[d] = new Map();
      const k = row.shift+"|"+(row.line||"")+"|"+row.pno;
      if(!m[d].has(k)) m[d].set(k, {date:d, shift:row.shift, line:row.line||"", pno:row.pno, name:row.name||"", qty:0});
      m[d].get(k).qty += (row.qty||0);
    });
    const out = {};
    Object.keys(m).forEach(d=> out[d] = [...m[d].values()]);
    return out;
  }, [planData, ym, hasPlan]);

  // 날짜별 완료도
  const stat = useMemo(()=>{
    const out = {};
    Object.keys(byDate).forEach(d=>{
      const rows = byDate[d];
      let need=0, done=0;
      rows.forEach(row=>{
        need+=2;
        if(recOf("startup",row)) done++;
        if(recOf("dock",row)) done++;
      });
      const groups = [...new Set(rows.map(r=> (r.line||"")+"|"+r.shift))];
      groups.forEach(g=>{
        const i=g.lastIndexOf("|");
        need++;
        if(photoOf(g.slice(0,i), d, g.slice(i+1))) done++;
      });
      out[d] = {need, done, ok: need>0 && done>=need, lines: [...new Set(rows.map(r=>r.line))].filter(Boolean)};
    });
    return out;
  }, [byDate, records, photos]);

  // 선택 날짜 상세 (라인·주야별)
  const detail = useMemo(()=>{
    if(!sel || !byDate[sel]) return [];
    const m = new Map();
    byDate[sel].forEach(row=>{
      const k = (row.line||"")+"|"+row.shift;
      if(!m.has(k)) m.set(k, {line:row.line||"", shift:row.shift, rows:[]});
      m.get(k).rows.push(row);
    });
    const arr = [...m.values()];
    arr.forEach(g=>{
      g.su = g.rows.every(r=> !!recOf("startup", r));
      g.dk = g.rows.every(r=> !!recOf("dock", r));
      g.ph = !!photoOf(g.line, sel, g.shift);
      g.qty = g.rows.reduce((s,r)=>s+(r.qty||0),0);
    });
    return arr.sort((a,b)=> a.shift===b.shift ? String(a.line).localeCompare(String(b.line)) : (a.shift==="주간"?-1:1));
  }, [sel, byDate, records, photos]);

  const cells = useMemo(()=>{
    const [y,mo] = ym.split("-").map(Number);
    const pad = new Date(y, mo-1, 1).getDay();
    const last = new Date(y, mo, 0).getDate();
    const out = [];
    for(let i=0;i<pad;i++) out.push(null);
    for(let d=1; d<=last; d++) out.push(`${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
    return out;
  }, [ym]);

  const moveMonth = (n)=>{
    const [y,mo] = ym.split("-").map(Number);
    const d = new Date(y, mo-1+n, 1);
    setYm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); setSel("");
  };

  const sum = useMemo(()=>{
    const ds = Object.keys(stat);
    return { days: ds.length, ok: ds.filter(d=>stat[d].ok).length };
  }, [stat]);

  const today = todayStr();

  return (
    <div className="space-y-4">
      <div className="rounded-2xl border border-slate-200 bg-white px-4 py-3">
        <div className="flex items-center justify-between">
          <button onClick={()=>moveMonth(-1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 font-bold text-[14px]">◀</button>
          <div className="text-center">
            <div className="font-extrabold text-slate-800 text-[17px]">{ym.split("-")[0]}년 {Number(ym.split("-")[1])}월</div>
            <div className="text-[11.5px] text-slate-400 mt-0.5">생산일 {sum.days}일 중 <span className="text-emerald-600 font-bold">{sum.ok}일 완료</span></div>
          </div>
          <button onClick={()=>moveMonth(1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 font-bold text-[14px]">▶</button>
        </div>
        <div className="flex items-center gap-3 mt-2.5 text-[11px] text-slate-500">
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-100 border border-emerald-300 inline-block"/>전부 완료</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-rose-100 border border-rose-300 inline-block"/>미완료</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-slate-50 border border-slate-200 inline-block"/>계획 없음</span>
        </div>
      </div>

      {!hasPlan && <div className="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-[13px] text-amber-700 font-bold">생산계획이 없습니다. 생산계획 탭에서 먼저 불러오세요.</div>}

      <div className="rounded-2xl border border-slate-200 bg-white p-2.5">
        <div className="grid grid-cols-7 gap-1 mb-1">
          {["일","월","화","수","목","금","토"].map((w,i)=>(
            <div key={w} className={`text-center text-[11.5px] font-bold py-1 ${i===0?"text-rose-400":i===6?"text-sky-400":"text-slate-400"}`}>{w}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d,i)=>{
            if(!d) return <div key={"e"+i} className="h-[62px]"/>;
            const s = stat[d];
            const dn = Number(d.slice(8));
            const isToday = d===today;
            const base = "h-[62px] rounded-xl border px-1.5 py-1 flex flex-col items-center justify-center transition";
            const cls = !s ? "border-slate-200 bg-slate-50 text-slate-300"
                      : s.ok ? "border-emerald-300 bg-emerald-50 text-emerald-700"
                             : "border-rose-300 bg-rose-50 text-rose-700";
            return (
              <button key={d} onClick={()=>setSel(sel===d?"":d)}
                className={`${base} ${cls} ${sel===d?"ring-2 ring-slate-800":""} ${isToday?"font-black":""}`}>
                <div className={`text-[14px] leading-none ${isToday?"underline":""}`}>{dn}</div>
                {s && <div className="text-[10px] font-bold mt-1 leading-tight">{s.done}/{s.need}</div>}
                {s && <div className="text-[9px] mt-0.5 opacity-70 leading-tight">{s.ok?"완료":"미완"}</div>}
              </button>
            );
          })}
        </div>
      </div>

      {sel && detail.length>0 && (
        <div className="rounded-2xl border border-slate-200 bg-white overflow-hidden">
          <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
            <div className="font-extrabold text-slate-800 text-[14.5px]">{sel} 상세</div>
            {onPickDate && <button onClick={()=>onPickDate(sel)} className="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-[12px] font-bold">생산계획에서 보기 →</button>}
          </div>
          <div className="divide-y divide-slate-100">
            <div className="grid grid-cols-[1fr_auto_auto_auto] gap-2 px-4 py-2 text-[11px] font-bold text-slate-400">
              <div>라인 / 주야</div><div className="w-14 text-center">Start Up</div><div className="w-14 text-center">Dock</div><div className="w-12 text-center">현황판</div>
            </div>
            {detail.map((g,i)=>(
              <div key={i} className="grid grid-cols-[1fr_auto_auto_auto] gap-2 px-4 py-2.5 items-center">
                <div>
                  <div className="text-[13.5px] font-bold text-slate-700">{g.line||"(라인없음)"}</div>
                  <div className="text-[11px] text-slate-400">{g.shift} · {g.rows.length}품번 · {g.qty.toLocaleString()}개</div>
                </div>
                <div className="w-14 text-center text-[15px]">{g.su?"✅":"❌"}</div>
                <div className="w-14 text-center text-[15px]">{g.dk?"✅":"❌"}</div>
                <div className="w-12 text-center text-[15px]">{g.ph?"✅":"❌"}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {sel && detail.length===0 && (
        <div className="rounded-2xl border border-slate-200 bg-white px-4 py-6 text-center text-[13px] text-slate-400">{sel} 생산계획이 없습니다.</div>
      )}
    </div>
  );
}

function BoardView({photos, onReload, getThumb, onDownload, onDelete, masterLines, onUpload}){
  const [fd, setFd] = useState(todayStr());   // 기본: 오늘만 ("" = 전체)
  const [fl, setFl] = useState("");        // 라인 필터
  const [fs, setFs] = useState("");        // 주야 필터
  const [viewer, setViewer] = useState(null);
  // 직접 추가 (생산계획에 없는 라인도 가능)
  const [addOpen, setAddOpen] = useState(false);
  const [aDate, setADate] = useState(todayStr());
  const [aLine, setALine] = useState("");
  const [aLineCustom, setALineCustom] = useState("");
  const [aShift, setAShift] = useState((new Date().getHours()>=6 && new Date().getHours()<18) ? "주간" : "야간");
  const [aBusy, setABusy] = useState(false);
  const addFileRef = useRef(null);
  const effLine = aLine==="__custom__" ? aLineCustom.trim() : aLine;
  const pickAddPhoto = ()=>{
    if(!effLine){ alert("라인을 선택하거나 입력하세요."); return; }
    addFileRef.current && addFileRef.current.click();
  };
  const onAddFile = async(e)=>{
    const f = e.target.files && e.target.files[0]; e.target.value="";
    if(!f) return;
    setABusy(true);
    const ok = await onUpload(f, {line: effLine, date: aDate, shift: aShift});
    setABusy(false);
    if(ok){ setAddOpen(false); setFd(aDate); setALineCustom(""); }
  };
  const list = (photos&&photos.list)||[];
  const lines = useMemo(()=> [...new Set(list.map(p=>p.line).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko")), [list]);
  const shown = useMemo(()=> list.filter(p=> (!fd || p.date===fd) && (!fl || p.line===fl) && (!fs || p.shift===fs)), [list, fd, fl, fs]);
  const byDate = useMemo(()=>{
    const m=new Map();
    shown.forEach(p=>{ if(!m.has(p.date)) m.set(p.date, []); m.get(p.date).push(p); });
    return [...m.entries()];
